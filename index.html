<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>PJUS – Service Desk</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── ESTRADA TOKENS ─────────────────────────────── */
:root{
  --primary:#0061D6; --secondary:#4D5858;
  --success:#0E8557; --warning:#FEC33C; --danger:#FF4D4F; --info:#0858C5;
  --gray-100:#DBDEDE; --gray-200:#A5ABAB; --gray-300:#717979; --gray-400:#4D5858;
  --text-primary:#0A0A0A; --text-secondary:#717979; --text-contrast:#A5ABAB;
  --shadow-sm:0 2px 8px #0000001a; --shadow-md:0 6px 24px #0000001a; --shadow-lg:0 16px 48px #00000020;
  --font-title:'Verdana',sans-serif; --font-text:'Lato',sans-serif;
  --radius:8px; --radius-sm:4px;
  --sidebar-bg:#3a4349; --sidebar-w:220px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font-text);background:#f0f2f5;color:var(--text-primary);font-size:14px;height:100vh;overflow:hidden}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit}
a{text-decoration:none;color:inherit}

/* ── LAYOUT ─────────────────────────────────────── */
.app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{
  width:var(--sidebar-w);min-width:var(--sidebar-w);
  background:var(--sidebar-bg);display:flex;flex-direction:column;
  transition:width .22s,min-width .22s;overflow:hidden;z-index:200;flex-shrink:0;
}
.sidebar.closed{width:0;min-width:0}
.sb-logo{display:flex;align-items:center;gap:10px;padding:16px;border-bottom:1px solid rgba(255,255,255,.07);min-height:56px}
.sb-logo-icon{width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-logo-icon svg{width:18px;height:18px}
.sb-logo-text{font-family:var(--font-title);font-weight:700;color:#fff;font-size:18px;white-space:nowrap}
.sb-user{display:flex;flex-direction:column;align-items:center;padding:18px 14px 14px;border-bottom:1px solid rgba(255,255,255,.07);gap:8px}
.sb-avatar{width:50px;height:50px;border-radius:50%;background:#5a6369;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sb-name{color:#dde3e6;font-size:12px;text-align:center;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:190px}
.sb-nav{flex:1;overflow-y:auto;padding:6px 0}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:3px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;color:#b8c4ca;font-size:13px;cursor:pointer;user-select:none;transition:background .14s,color .14s;white-space:nowrap}
.nav-item:hover{background:rgba(255,255,255,.07);color:#fff}
.nav-item.active{background:rgba(0,97,214,.28);color:#fff}
.nav-ico{width:18px;text-align:center;font-size:15px;flex-shrink:0}
.nav-lbl{flex:1}
.nav-arr{font-size:10px;transition:transform .18s;color:#8a9499}
.nav-arr.open{transform:rotate(180deg)}
.nav-group{font-size:10px;font-weight:700;color:#7a8a90;text-transform:uppercase;letter-spacing:.6px;padding:5px 16px 3px 46px}
.nav-sub{padding:8px 16px 8px 46px;color:#9fabb0;font-size:13px;cursor:pointer;transition:background .14s,color .14s;white-space:nowrap}
.nav-sub:hover{background:rgba(255,255,255,.06);color:#fff}
.nav-sub.active{color:#fff;font-weight:600}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;padding:0 24px;height:50px;gap:16px;flex-shrink:0;box-shadow:var(--shadow-sm)}
.topbar-l{display:flex;align-items:center;gap:14px}
.topbar-r{display:flex;align-items:center;gap:10px}
.btn-ham{padding:6px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:20px;line-height:1;transition:background .14s}
.btn-ham:hover{background:var(--gray-100)}
.greeting{font-size:13px;color:var(--text-secondary)}
.greeting b{color:var(--text-primary)}
.ip{color:var(--text-contrast);font-size:11px}
.btn-ico{padding:6px;border-radius:var(--radius-sm);color:var(--text-secondary);font-size:17px;transition:background .14s;line-height:1;display:flex;align-items:center}
.btn-ico:hover{background:var(--gray-100)}
.btn-sair{color:var(--danger);font-size:13px;font-weight:700;padding:4px 8px;border-radius:var(--radius-sm);display:flex;align-items:center;gap:4px;transition:background .14s}
.btn-sair:hover{background:#fff0f0}

/* SUBTOOLBAR */
.subt{background:#fff;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;padding:6px 24px;gap:14px;flex-shrink:0;flex-wrap:wrap}
.subt-l{display:flex;align-items:center;gap:10px;flex:1;flex-wrap:wrap}
.subt-r{display:flex;align-items:center;gap:8px}
.subt-lbl{font-size:12px;color:var(--text-secondary);white-space:nowrap}
.subt-input{border:1px solid var(--gray-100);border-radius:var(--radius-sm);padding:4px 10px;font-size:13px;color:var(--text-primary);outline:none;width:210px;transition:border-color .14s}
.subt-input:focus{border-color:var(--primary)}
.subt-select{border:1px solid var(--gray-100);border-radius:var(--radius-sm);padding:4px 10px;font-size:13px;background:#fff;outline:none;cursor:pointer}
.btn-lnk{color:var(--primary);font-size:13px;display:flex;align-items:center;gap:4px;padding:4px 8px;border-radius:var(--radius-sm);transition:background .14s}
.btn-lnk:hover{background:#e8f0fe}

/* BUTTONS (Estrada) */
.btn{display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--radius-sm);font-size:14px;font-weight:700;border:1px solid transparent;cursor:pointer;transition:all .15s;white-space:nowrap}
.btn-primary{background:var(--primary);border-color:var(--primary);color:#fff}
.btn-primary:hover{background:#0051b5}
.btn-secondary{background:#fff;color:var(--secondary);border-color:var(--secondary)}
.btn-secondary:hover{color:var(--primary);border-color:var(--primary)}
.btn-danger{background:var(--danger);color:#fff;border-color:var(--danger)}
.btn-success{background:var(--success);color:#fff;border-color:var(--success)}
.btn-sm{padding:4px 12px;font-size:13px}
.btn-full{width:100%}
.btn:disabled{opacity:.5;cursor:not-allowed}

/* CONTENT */
.content{flex:1;overflow-y:auto;padding:22px;scroll-behavior:smooth}
.content::-webkit-scrollbar{width:6px}
.content::-webkit-scrollbar-thumb{background:var(--gray-100);border-radius:4px}

/* PAGE SECTIONS */
.page-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid var(--text-primary)}
.page-title{font-family:var(--font-title);font-weight:700;font-size:18px}
.section{margin-bottom:28px}
.section-title{font-family:var(--font-title);font-weight:700;font-size:14px;margin-bottom:14px;padding-bottom:6px;border-bottom:1px solid var(--text-primary)}

/* GRID */
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g2-1{display:grid;grid-template-columns:2fr 1fr;gap:20px}
@media(max-width:900px){.g3{grid-template-columns:repeat(2,1fr)}}
@media(max-width:600px){.g3,.g2,.g2-1{grid-template-columns:1fr}}

/* KPI CARD */
.kpi{border-radius:var(--radius);overflow:hidden;background:#fff;box-shadow:var(--shadow-sm)}
.kpi-h{background:#3a4349;color:#fff;padding:8px 14px;font-size:12px;font-weight:600;text-align:center;line-height:1.3}
.kpi-b{padding:14px;display:flex;align-items:center;justify-content:center;min-height:68px}
.kpi-v{font-size:30px;font-weight:700;font-family:var(--font-title)}
.c-danger{color:var(--danger)} .c-warning{color:var(--warning)} .c-success{color:var(--success)} .c-info{color:var(--info)}

/* CARD (Estrada) */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);padding:16px}
.card-bordered{border:1px solid var(--gray-100)}
.chart-card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.chart-h{background:#3a4349;color:#fff;padding:8px 14px;font-size:12px;font-weight:600;text-align:center}
.chart-b{padding:14px}

/* FORM (Estrada) */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;color:var(--text-secondary);margin-bottom:6px}
.form-control{padding:5px 14px;border-radius:var(--radius-sm);border:1px solid var(--gray-100);font-size:13px;display:block;width:100%;outline:none;transition:border-color .14s;font-family:inherit;line-height:1.5}
.form-control:focus{border-color:var(--primary)}
.form-control[readonly]{background:var(--gray-100)}
.form-control.invalid{border-color:var(--danger)}
textarea.form-control{resize:vertical;min-height:80px}
.input-error{color:var(--danger);font-size:11px;margin-top:4px;display:block}
.input-group{display:flex}
.input-group .form-control{border-radius:var(--radius-sm) 0 0 var(--radius-sm)}
.input-group .btn{border-radius:0 var(--radius-sm) var(--radius-sm) 0}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:var(--radius);box-shadow:var(--shadow-sm)}
table{width:100%;border-collapse:collapse;background:#fff}
thead tr{background:#3a4349;color:#fff}
thead th{padding:9px 14px;font-size:12px;font-weight:600;text-align:left;white-space:nowrap}
tbody tr{border-bottom:1px solid var(--gray-100);transition:background .1s}
tbody tr:hover{background:#f8f9fa}
tbody tr:last-child{border:none}
td{padding:9px 14px;font-size:13px}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600;white-space:nowrap}
.b-danger{background:#fff0f0;color:var(--danger)}
.b-success{background:#e8f5ef;color:var(--success)}
.b-warning{background:#fff8e6;color:#a07700}
.b-info{background:#e8f0fe;color:var(--info)}
.b-gray{background:var(--gray-100);color:var(--text-secondary)}

/* TABS (Estrada) */
.tabs{display:flex;gap:4px;border-bottom:2px solid var(--gray-100);margin-bottom:18px}
.btn-tab{background:transparent;color:var(--text-secondary);padding:7px 14px;font-size:14px;border:none;cursor:pointer;border-radius:var(--radius-sm) var(--radius-sm) 0 0;margin-bottom:-2px;font-family:inherit;transition:color .14s;border-bottom:2px solid transparent}
.btn-tab:hover{color:var(--primary)}
.btn-tab.active{color:var(--primary);font-weight:700;border-bottom:2px solid var(--primary)}

/* ALERT */
.alert{padding:12px 14px;border-radius:var(--radius);font-size:13px;margin-bottom:14px;display:flex;align-items:flex-start;gap:10px;line-height:1.5}
.alert-info{background:#e8f0fe;color:var(--info);border-left:4px solid var(--info)}
.alert-success{background:#e8f5ef;color:var(--success);border-left:4px solid var(--success)}
.alert-danger{background:#fff0f0;color:var(--danger);border-left:4px solid var(--danger)}
.alert-warning{background:#fff8e6;color:#a07700;border-left:4px solid var(--warning)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.45);display:flex;align-items:center;justify-content:center;z-index:900;padding:16px;opacity:0;pointer-events:none;transition:opacity .2s}
.overlay.show{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:var(--radius);width:100%;max-width:540px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-lg);transform:translateY(20px);transition:transform .2s}
.overlay.show .modal{transform:translateY(0)}
.modal-hd{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-bottom:1px solid var(--gray-100)}
.modal-title{font-family:var(--font-title);font-weight:700;font-size:14px}
.btn-x{font-size:18px;color:var(--text-secondary);padding:4px;border-radius:var(--radius-sm);line-height:1}
.btn-x:hover{background:var(--gray-100)}
.modal-bd{padding:20px}
.modal-ft{padding:12px 20px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:8px}

/* STEPPER */
.stepper{display:flex;align-items:center;margin-bottom:26px}
.step-wrap{display:flex;align-items:center;gap:8px}
.step-line{flex:1;height:2px;background:var(--gray-100);margin:0 6px}
.step-line.done{background:var(--success)}
.step-circle{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:13px;flex-shrink:0}
.sc-done{background:var(--success);color:#fff}
.sc-active{background:var(--primary);color:#fff}
.sc-pending{background:var(--gray-100);color:var(--text-secondary)}
.step-lbl{font-size:12px;color:var(--text-secondary);white-space:nowrap}
.step-lbl.active{color:var(--primary);font-weight:600}

/* PROGRESS */
.progress{background:var(--gray-100);border-radius:99px;height:7px;overflow:hidden}
.progress-bar{height:100%;border-radius:99px;transition:width .35s}
.pb-primary{background:var(--primary)} .pb-success{background:var(--success)} .pb-warning{background:var(--warning)} .pb-danger{background:var(--danger)}

/* STARS */
.stars{display:flex;gap:3px;align-items:center}
.star{font-size:22px;cursor:pointer;color:var(--gray-100);transition:color .1s;line-height:1}
.star.on{color:var(--warning)}

/* PAGINATION */
.pager{display:flex;gap:5px;justify-content:center;margin-top:14px}
.pg{width:30px;height:30px;border-radius:var(--radius-sm);border:1px solid var(--gray-100);background:#fff;font-size:13px;color:var(--text-secondary);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .14s}
.pg:hover{border-color:var(--primary);color:var(--primary)}
.pg.active{background:var(--primary);color:#fff;border-color:var(--primary)}

/* STATUS DOT */
.dot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-s{background:var(--success)} .dot-w{background:var(--warning)} .dot-d{background:var(--danger)}

/* CALENDAR */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-hd{text-align:center;font-size:11px;font-weight:600;color:var(--text-secondary);padding:3px}
.cal-day{aspect-ratio:1;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:background .12s;position:relative}
.cal-day:hover{background:#e8f0fe}
.cal-day.today{background:var(--primary);color:#fff;font-weight:700}
.cal-day.other{color:var(--gray-200)}
.cal-day.has-ev::after{content:'';position:absolute;bottom:3px;width:5px;height:5px;border-radius:50%;background:var(--warning)}
.cal-day.today.has-ev::after{background:#fff}

/* TOAST */
.toast-wrap{position:fixed;bottom:20px;right:20px;display:flex;flex-direction:column;gap:7px;z-index:9999}
.toast{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-md);padding:11px 14px;display:flex;align-items:center;gap:9px;min-width:260px;max-width:360px;font-size:13px;border-left:4px solid var(--primary);animation:slideIn .22s ease;cursor:pointer}
.toast.s{border-color:var(--success)}
.toast.e{border-color:var(--danger)}
@keyframes slideIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
.toast-ico{font-size:16px}

/* EMPTY STATE */
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 20px;gap:12px;color:var(--text-secondary)}
.empty-ico{font-size:44px;opacity:.35}
.empty-txt{font-size:14px}

/* UTILS */
.flex{display:flex} .ai{align-items:center} .jb{justify-content:space-between} .je{justify-content:flex-end}
.gap-sm{gap:6px} .gap-md{gap:10px} .gap-lg{gap:16px}
.mb-sm{margin-bottom:6px} .mb-md{margin-bottom:10px} .mb-lg{margin-bottom:16px} .mb-xl{margin-bottom:22px}
.mt-md{margin-top:10px} .mt-lg{margin-top:16px} .mt-xl{margin-top:22px}
.bold{font-weight:700} .semi{font-weight:600}
.text-muted{color:var(--text-secondary)} .text-xs{font-size:11px} .text-sm{font-size:13px}
.text-pjus{color:var(--primary)} .text-danger{color:var(--danger)} .text-success{color:var(--success)}
.w-full{width:100%} .hr{border:none;border-top:1px solid var(--gray-100);margin:14px 0}
.detail-grid{display:grid;grid-template-columns:130px 1fr;gap:9px 14px;font-size:13px}
.hidden{display:none!important}
</style>
</head>
<body>
<div class="app">

  <!-- SIDEBAR -->
  <aside class="sidebar" id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">
        <svg viewBox="0 0 24 24" fill="none"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="white"/></svg>
      </div>
      <span class="sb-logo-text">PJUS</span>
    </div>
    <div class="sb-user">
      <div class="sb-avatar">
        <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
          <circle cx="14" cy="10" r="5" fill="#9aabb0"/>
          <ellipse cx="14" cy="24" rx="9" ry="6" fill="#9aabb0"/>
        </svg>
      </div>
      <span class="sb-name">Igor Vilar de Almeida Costa</span>
    </div>
    <nav class="sb-nav">
      <div class="nav-item" data-page="ajuda" onclick="navigate('ajuda')">
        <span class="nav-ico">❓</span><span class="nav-lbl">Ajuda</span>
      </div>
      <div class="nav-item active" data-page="dashboard" onclick="navigate('dashboard')">
        <span class="nav-ico">⊞</span><span class="nav-lbl">Dashboard</span>
      </div>
      <!-- Chamados -->
      <div class="nav-item" onclick="toggleMenu('menu-chamados','arr-chamados')">
        <span class="nav-ico">📋</span><span class="nav-lbl">Chamados</span>
        <span class="nav-arr open" id="arr-chamados">▾</span>
      </div>
      <div id="menu-chamados">
        <div class="nav-group">Solicitante</div>
        <div class="nav-sub" data-page="abertura" onclick="navigate('abertura')">Abertura</div>
        <div class="nav-sub" data-page="meus-chamados" onclick="navigate('meus-chamados')">Meus chamados</div>
        <div class="nav-sub" data-page="pesquisa" onclick="navigate('pesquisa')">Pesquisa satisfação</div>
      </div>
      <!-- Configuração -->
      <div class="nav-item" onclick="toggleMenu('menu-config','arr-config')">
        <span class="nav-ico">⚙️</span><span class="nav-lbl">Configuração</span>
        <span class="nav-arr" id="arr-config">▾</span>
      </div>
      <div id="menu-config" class="hidden">
        <div class="nav-group">Usuário</div>
        <div class="nav-sub" data-page="agenda" onclick="navigate('agenda')">Agenda</div>
        <div class="nav-sub" data-page="alterar-senha" onclick="navigate('alterar-senha')">Alterar senha</div>
        <div class="nav-sub" data-page="usuario" onclick="navigate('usuario')">Usuário</div>
      </div>
    </nav>
  </aside>

  <!-- MAIN -->
  <div class="main">
    <!-- TOPBAR -->
    <div class="topbar">
      <div class="topbar-l">
        <button class="btn-ham" onclick="toggleSidebar()">☰</button>
        <span class="greeting"><b>Olá, Igor</b> &nbsp;<span class="ip">— IP: 186.248.225.226</span></span>
      </div>
      <div class="topbar-r">
        <button class="btn-ico" title="Configurações">⚙</button>
        <button class="btn-ico" title="Ajuda">ℹ</button>
        <button class="btn-sair">↩ Sair</button>
      </div>
    </div>
    <!-- SUBTOOLBAR -->
    <div class="subt">
      <div class="subt-l">
        <span class="subt-lbl">Buscar menu:</span>
        <input class="subt-input" id="menuSearch" placeholder="Pesquisar menu - digite 3 caracteres" oninput="searchMenu(this.value)"/>
        <span class="subt-lbl">Telas:</span>
        <select class="subt-select" onchange="if(this.value)navigate(this.value)">
          <option value="">Telas mais acessadas</option>
          <option value="dashboard">Dashboard</option>
          <option value="abertura">Abertura de chamado</option>
          <option value="meus-chamados">Meus chamados</option>
          <option value="pesquisa">Pesquisa satisfação</option>
        </select>
      </div>
      <div class="subt-r">
        <button class="btn-lnk" onclick="navigate('abertura')">◄ Abertura de chamado</button>
        <button class="btn btn-primary btn-sm" onclick="navigate('abertura')">+ Novo chamado</button>
      </div>
    </div>
    <!-- PAGES -->
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <div class="modal-hd"><span class="modal-title" id="modal-title"></span><button class="btn-x" onclick="closeModal()">✕</button></div>
    <div class="modal-bd" id="modal-body"></div>
    <div class="modal-ft" id="modal-footer"></div>
  </div>
</div>

<!-- TOAST CONTAINER -->
<div class="toast-wrap" id="toasts"></div>

<script>

/* ═══════════════════════════════
   NAVIGATION
═══════════════════════════════ */
let currentPage = 'dashboard';
function navigate(page) {
  currentPage = page;
  // Atualiza nav
  document.querySelectorAll('.nav-item[data-page],.nav-sub[data-page]').forEach(el => {
    el.classList.toggle('active', el.dataset.page === page);
  });
  // Render
  const c = document.getElementById('content');
  c.scrollTop = 0;
  switch(page) {
    case 'dashboard':      c.innerHTML = renderDashboard(); initCharts(); break;
    case 'abertura':       aberturaStep=1; aberturaForm={cat:'',subcat:'',titulo:'',desc:'',urgencia:'Normal'}; c.innerHTML = renderAbertura(); break;
    case 'meus-chamados':  chamadoPage=1; c.innerHTML = renderMeusChamados(); break;
    case 'pesquisa':       c.innerHTML = renderPesquisa(); break;
    case 'agenda':         c.innerHTML = renderAgenda(); initCal(); break;
    case 'alterar-senha':  c.innerHTML = renderAlterarSenha(); break;
    case 'usuario':        c.innerHTML = renderUsuario(); break;
    case 'ajuda':          c.innerHTML = renderAjuda(); break;
    default:               c.innerHTML = renderDashboard(); initCharts();
  }
}

function toggleSidebar() {
  document.getElementById('sidebar').classList.toggle('closed');
}
function toggleMenu(id, arrId) {
  const el = document.getElementById(id);
  const arr = document.getElementById(arrId);
  el.classList.toggle('hidden');
  arr.classList.toggle('open');
}
function searchMenu(v) {
  if (v.length >= 3) {
    const pages = [{k:'dashboard',l:'Dashboard'},{k:'abertura',l:'Abertura'},{k:'meus-chamados',l:'Meus chamados'},{k:'pesquisa',l:'Pesquisa satisfação'},{k:'agenda',l:'Agenda'},{k:'alterar-senha',l:'Alterar senha'},{k:'usuario',l:'Usuário'},{k:'ajuda',l:'Ajuda'}];
    const found = pages.find(p => p.l.toLowerCase().includes(v.toLowerCase()));
    if (found) navigate(found.k);
  }
}

/* ═══════════════════════════════
   TOAST
═══════════════════════════════ */
function toast(msg, type='info') {
  const w = document.getElementById('toasts');
  const id = 't'+Date.now();
  const ico = type==='s'?'✓':type==='e'?'✕':'ℹ';
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.id = id;
  el.innerHTML = `<span class="toast-ico">${ico}</span><span>${msg}</span>`;
  el.onclick = () => el.remove();
  w.appendChild(el);
  setTimeout(() => el && el.remove(), 3800);
}

/* ═══════════════════════════════
   MODAL
═══════════════════════════════ */
function openModal(title, body, footer='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal').classList.add('show');
}
function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('show');
  }
}

/* ═══════════════════════════════
   HELPERS
═══════════════════════════════ */
function badgeStatus(s) {
  const m = {'Aberto':'b-info','Em andamento':'b-warning','Concluído':'b-success','Devolvido':'b-danger'};
  return `<span class="badge ${m[s]||'b-gray'}">${s}</span>`;
}
function badgePrio(p) {
  const m = {'Urgente':'b-danger','Alta':'b-warning','Normal':'b-info','Baixa':'b-gray'};
  return `<span class="badge ${m[p]||'b-gray'}">${p}</span>`;
}
function dotSla(s) {
  const c = s==='Dentro'?'dot-s':s==='Acima 50%'?'dot-w':'dot-d';
  return `<span class="dot ${c}" style="margin-right:5px"></span>${s}`;
}

/* ═══════════════════════════════
   ABERTURA (STEPPER)
═══════════════════════════════ */
function renderAbertura() {
  const steps = ['Categoria','Detalhes','Confirmação'];
  const stepper = steps.map((s,i)=>{
    const n=i+1, state=n<aberturaStep?'done':n===aberturaStep?'active':'pending';
    const cls=state==='done'?'sc-done':state==='active'?'sc-active':'sc-pending';
    const lbl=`<span class="step-lbl${state==='active'?' active':''}">${s}</span>`;
    const circ=`<div class="step-circle ${cls}">${state==='done'?'✓':n}</div>`;
    const line=i<steps.length-1?`<div class="step-line${aberturaStep>n?' done':''}"></div>`:'';
    return `<div class="step-wrap">${circ}${lbl}</div>${line}`;
  }).join('');

  let body='';
  if (aberturaStep===1) body=`
    <div class="form-group"><label class="form-label">Categoria *</label>
      <select class="form-control" id="ab-cat" onchange="aberturaForm.cat=this.value">
        <option value="">Selecione...</option>
        <option${aberturaForm.cat==='Financeiro'?' selected':''}>Financeiro</option>
        <option${aberturaForm.cat==='TI'?' selected':''}>TI</option>
        <option${aberturaForm.cat==='Suporte'?' selected':''}>Suporte</option>
        <option${aberturaForm.cat==='Cadastro'?' selected':''}>Cadastro</option>
        <option${aberturaForm.cat==='Operacional'?' selected':''}>Operacional</option>
      </select></div>
    <div class="form-group"><label class="form-label">Subcategoria</label>
      <select class="form-control" id="ab-sub" onchange="aberturaForm.subcat=this.value">
        <option value="">Selecione...</option>
        <option>Boleto</option><option>Relatório</option><option>Acesso</option><option>Integração</option>
      </select></div>`;
  else if (aberturaStep===2) body=`
    <div class="form-group"><label class="form-label">Título *</label>
      <input class="form-control" id="ab-tit" placeholder="Resumo do problema" value="${aberturaForm.titulo}" oninput="aberturaForm.titulo=this.value"/></div>
    <div class="form-group"><label class="form-label">Descrição *</label>
      <textarea class="form-control" id="ab-desc" rows="4" placeholder="Descreva o problema com detalhes...">${aberturaForm.desc}</textarea></div>
    <div class="form-group"><label class="form-label">Urgência</label>
      <select class="form-control" id="ab-urg" onchange="aberturaForm.urgencia=this.value">
        ${['Baixa','Normal','Alta','Urgente'].map(u=>`<option${u===aberturaForm.urgencia?' selected':''}>${u}</option>`).join('')}
      </select></div>
    <div class="form-group"><label class="form-label">Anexo (opcional)</label>
      <input type="file" class="form-control" style="padding-top:5px"/></div>`;
  else body=`
    <div class="alert alert-info mb-lg"><span>ℹ</span><span>Revise as informações antes de confirmar.</span></div>
    <div class="detail-grid">
      <span class="text-muted">Categoria:</span><strong>${aberturaForm.cat||'—'}</strong>
      <span class="text-muted">Subcategoria:</span><strong>${aberturaForm.subcat||'—'}</strong>
      <span class="text-muted">Título:</span><strong>${aberturaForm.titulo||'—'}</strong>
      <span class="text-muted">Urgência:</span>${badgePrio(aberturaForm.urgencia)}
      <span class="text-muted">Solicitante:</span><strong>Igor Vilar de Almeida Costa</strong>
    </div>`;

  return `
  <div class="page-header"><h1 class="page-title">Abertura de Chamado</h1></div>
  <div class="stepper mb-xl">${stepper}</div>
  <div class="card" style="max-width:620px">
    <div>${body}</div>
    <div class="flex je gap-md mt-xl">
      ${aberturaStep>1?`<button class="btn btn-secondary btn-sm" onclick="aberturaBack()">← Voltar</button>`:''}
      <button class="btn btn-primary btn-sm" onclick="aberturaNext()">
        ${aberturaStep<3?'Próximo →':'✓ Abrir Chamado'}
      </button>
    </div>
  </div>`;
}

function aberturaNext() {
  if (aberturaStep===1) {
    aberturaForm.cat = document.getElementById('ab-cat')?.value||aberturaForm.cat;
  } else if (aberturaStep===2) {
    aberturaForm.titulo = document.getElementById('ab-tit')?.value||aberturaForm.titulo;
    aberturaForm.desc = document.getElementById('ab-desc')?.value||aberturaForm.desc;
    aberturaForm.urgencia = document.getElementById('ab-urg')?.value||aberturaForm.urgencia;
    if (!aberturaForm.titulo.trim()) { toast('Preencha o título do chamado.','e'); return; }
  } else {
    toast('Chamado #1008 aberto com sucesso!','s');
    aberturaStep=1; aberturaForm={cat:'',subcat:'',titulo:'',desc:'',urgencia:'Normal'};
    document.getElementById('content').innerHTML = renderAbertura();
    return;
  }
  aberturaStep++;
  document.getElementById('content').innerHTML = renderAbertura();
}
function aberturaBack() {
  if (aberturaStep>1) { aberturaStep--; document.getElementById('content').innerHTML = renderAbertura(); }
}

/* ═══════════════════════════════
   MEUS CHAMADOS
═══════════════════════════════ */
const PER_PAGE = 5;
function renderMeusChamados() {
  const filtered = CHAMADOS.filter(c => {
    const ms = chamadoFiltro==='Todos'||c.status===chamadoFiltro;
    const mb = c.titulo.toLowerCase().includes(chamadoBusca.toLowerCase())||String(c.id).includes(chamadoBusca);
    return ms && mb;
  });
  const total = Math.ceil(filtered.length/PER_PAGE);
  const paged = filtered.slice((chamadoPage-1)*PER_PAGE, chamadoPage*PER_PAGE);

  const rows = paged.length===0
    ? `<tr><td colspan="8"><div class="empty"><span class="empty-ico">📭</span><span class="empty-txt">Nenhum chamado encontrado</span></div></td></tr>`
    : paged.map(c=>`
      <tr>
        <td class="text-pjus bold">#${c.id}</td>
        <td style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${c.titulo}</td>
        <td><span class="badge b-gray">${c.cat}</span></td>
        <td>${badgePrio(c.prio)}</td>
        <td>${badgeStatus(c.status)}</td>
        <td>${c.data}</td>
        <td>${dotSla(c.sla)}</td>
        <td><button class="btn btn-secondary btn-sm" onclick="openChamado(${c.id})">Ver</button></td>
      </tr>`).join('');

  const pager = total>1 ? `
    <div class="pager">
      <button class="pg" onclick="setPage(${chamadoPage-1})" ${chamadoPage===1?'disabled':''}>‹</button>
      ${Array.from({length:total},(_,i)=>`<button class="pg${chamadoPage===i+1?' active':''}" onclick="setPage(${i+1})">${i+1}</button>`).join('')}
      <button class="pg" onclick="setPage(${chamadoPage+1})" ${chamadoPage===total?'disabled':''}>›</button>
    </div>` : '';

  return `
  <div class="page-header"><h1 class="page-title">Meus Chamados</h1><span class="text-muted text-sm">${filtered.length} chamado(s)</span></div>
  <div class="card mb-lg">
    <div class="flex ai gap-lg" style="flex-wrap:wrap">
      <div style="flex:1;min-width:200px">
        <label class="form-label">Buscar</label>
        <div class="input-group">
          <input class="form-control" value="${chamadoBusca}" placeholder="Nº ou título..." oninput="chamadoBusca=this.value;chamadoPage=1;rerenderChamados()"/>
          <button class="btn btn-secondary">🔍</button>
        </div>
      </div>
      <div>
        <label class="form-label">Status</label>
        <select class="form-control" onchange="chamadoFiltro=this.value;chamadoPage=1;rerenderChamados()">
          ${['Todos','Aberto','Em andamento','Concluído','Devolvido'].map(s=>`<option${s===chamadoFiltro?' selected':''}>${s}</option>`).join('')}
        </select>
      </div>
    </div>
  </div>
  <div class="table-wrap mb-md">
    <table>
      <thead><tr><th>#</th><th>Título</th><th>Categoria</th><th>Prioridade</th><th>Status</th><th>Data</th><th>SLA</th><th>Ação</th></tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>
  ${pager}`;
}
function rerenderChamados() { document.getElementById('content').innerHTML = renderMeusChamados(); }
function setPage(p) {
  const filtered = CHAMADOS.filter(c=>(chamadoFiltro==='Todos'||c.status===chamadoFiltro)&&(c.titulo.toLowerCase().includes(chamadoBusca.toLowerCase())||String(c.id).includes(chamadoBusca)));
  const total = Math.ceil(filtered.length/PER_PAGE);
  chamadoPage = Math.max(1,Math.min(p,total));
  rerenderChamados();
}

/* ═══════════════════════════════
   PESQUISA SATISFAÇÃO
═══════════════════════════════ */
function renderPesquisa() {
  const pendentes = CHAMADOS.filter(c=>c.status==='Concluído');
  const cards = pendentes.map(c => {
    if (enviados[c.id]) return `
      <div class="card mb-md">
        <div class="alert alert-success" style="margin:0"><span>✓</span><span>Obrigado pela avaliação do chamado <strong>#${c.id}</strong>!</span></div>
      </div>`;
    const stars = [1,2,3,4,5].map(n=>`<span class="star${(ratings[c.id]||0)>=n?' on':''}" onclick="setRating(${c.id},${n})">★</span>`).join('');
    const lbls = ['','Péssimo','Ruim','Regular','Bom','Excelente'];
    return `
      <div class="card mb-md">
        <div class="flex ai jb mb-md">
          <span class="bold">#${c.id} — ${c.titulo}</span>
          <span class="badge b-gray">${c.cat}</span>
        </div>
        <p class="text-muted text-xs mb-lg">Concluído em ${c.data}</p>
        <p class="form-label mb-md">Como avalia o atendimento?</p>
        <div class="stars mb-lg" id="stars-${c.id}">
          ${stars}
          <span style="margin-left:8px;font-size:12px;color:var(--text-secondary)">${ratings[c.id]?lbls[ratings[c.id]]:''}</span>
        </div>
        <div class="form-group">
          <label class="form-label">Comentário (opcional)</label>
          <textarea class="form-control" rows="2" placeholder="Deixe seu comentário..." onchange="comentarios[${c.id}]=this.value">${comentarios[c.id]||''}</textarea>
        </div>
        <button class="btn btn-primary btn-sm" onclick="enviarAvaliacao(${c.id})">Enviar avaliação</button>
      </div>`;
  }).join('');
  return `
  <div class="page-header"><h1 class="page-title">Pesquisa de Satisfação</h1></div>
  <div class="alert alert-info mb-lg"><span>ℹ</span><span>Avalie os chamados concluídos para nos ajudar a melhorar o serviço.</span></div>
  ${pendentes.length===0?`<div class="empty"><span class="empty-ico">🎉</span><span class="empty-txt">Nenhum chamado pendente de avaliação!</span></div>`:cards}`;
}
function setRating(id, n) {
  ratings[id] = n;
  const lbls = ['','Péssimo','Ruim','Regular','Bom','Excelente'];
  const cont = document.getElementById('stars-'+id);
  if (!cont) return;
  cont.innerHTML = [1,2,3,4,5].map(x=>`<span class="star${n>=x?' on':''}" onclick="setRating(${id},${x})">★</span>`).join('')
    + `<span style="margin-left:8px;font-size:12px;color:var(--text-secondary)">${lbls[n]}</span>`;
}
function enviarAvaliacao(id) {
  if (!ratings[id]) { toast('Selecione uma avaliação antes de enviar.','e'); return; }
  enviados[id] = true;
  toast('Avaliação enviada com sucesso!','s');
  document.getElementById('content').innerHTML = renderPesquisa();
}

/* ═══════════════════════════════
   AGENDA
═══════════════════════════════ */
function renderAgenda() {
  const evMes = events.filter(e=>e.data.startsWith(`${calAno}-${String(calMes+1).padStart(2,'0')}`));
  return `
  <div class="page-header">
    <h1 class="page-title">Agenda</h1>
    <button class="btn btn-primary btn-sm" onclick="novoEvento()">+ Novo evento</button>
  </div>
  <div class="g2-1">
    <div class="card">
      <div class="flex ai jb mb-lg">
        <button class="btn btn-secondary btn-sm" onclick="mudarMes(-1)">‹</button>
        <strong style="font-size:14px">${MESES[calMes]} ${calAno}</strong>
        <button class="btn btn-secondary btn-sm" onclick="mudarMes(1)">›</button>
      </div>
      <div class="cal-grid mb-sm">${DIAS_SEM.map(d=>`<div class="cal-hd">${d}</div>`).join('')}</div>
      <div class="cal-grid" id="cal-days"></div>
    </div>
    <div>
      <div class="section-title">Eventos do mês</div>
      ${evMes.length===0?`<p class="text-muted text-sm">Nenhum evento este mês.</p>`:
        evMes.map(e=>`<div class="card card-bordered mb-md" style="padding:10px 14px"><p class="text-xs text-muted">${e.data}</p><p class="semi text-sm">${e.titulo}</p></div>`).join('')}
    </div>
  </div>`;
}
function initCal() {
  setTimeout(()=>{
    const el = document.getElementById('cal-days');
    if (!el) return;
    const primeiro = new Date(calAno,calMes,1);
    const ultimo = new Date(calAno,calMes+1,0);
    const hoje = new Date();
    const dias = [];
    for(let i=0;i<primeiro.getDay();i++) { const d=new Date(calAno,calMes,1-primeiro.getDay()+i); dias.push({d,outro:true}); }
    for(let d=1;d<=ultimo.getDate();d++) dias.push({d:new Date(calAno,calMes,d),outro:false});
    while(dias.length%7!==0) { const last=dias[dias.length-1].d; dias.push({d:new Date(last.getFullYear(),last.getMonth(),last.getDate()+1),outro:true}); }
    el.innerHTML = dias.map(({d,outro})=>{
      const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
      const isToday = d.toDateString()===hoje.toDateString();
      const hasEv = events.some(e=>e.data===ds);
      return `<div class="cal-day${outro?' other':''}${isToday?' today':''}${hasEv?' has-ev':''}" onclick="${!outro?`calDayClick('${ds}')`:''}">${d.getDate()}</div>`;
    }).join('');
  },30);
}
function mudarMes(d) {
  calMes+=d;
  if(calMes<0){calMes=11;calAno--;}
  if(calMes>11){calMes=0;calAno++;}
  document.getElementById('content').innerHTML=renderAgenda();
  initCal();
}
function calDayClick(ds) { novoEvento(ds); }
function novoEvento(ds='') {
  openModal('Novo evento',
    `<div class="form-group"><label class="form-label">Data</label><input class="form-control" id="ev-data" type="date" value="${ds}"/></div>
     <div class="form-group"><label class="form-label">Título *</label><input class="form-control" id="ev-tit" placeholder="Ex: Reunião, treinamento..."/></div>`,
    `<button class="btn btn-secondary btn-sm" onclick="closeModal()">Cancelar</button>
     <button class="btn btn-primary btn-sm" onclick="salvarEvento()">Salvar</button>`);
}
function salvarEvento() {
  const tit = document.getElementById('ev-tit')?.value?.trim();
  const data = document.getElementById('ev-data')?.value;
  if (!tit) { toast('Informe o título do evento.','e'); return; }
  events.push({data:data||`${calAno}-${String(calMes+1).padStart(2,'0')}-01`,titulo:tit});
  closeModal();
  toast('Evento adicionado!','s');
  document.getElementById('content').innerHTML=renderAgenda();
  initCal();
}

/* ═══════════════════════════════
   ALTERAR SENHA
═══════════════════════════════ */
function renderAlterarSenha() {
  return `
  <div class="page-header"><h1 class="page-title">Alterar Senha</h1></div>
  <div class="card" style="max-width:460px">
    <div class="form-group">
      <label class="form-label">Senha atual *</label>
      <input type="password" class="form-control" id="pw-atual" oninput=""/>
      <span class="input-error hidden" id="err-atual">Campo obrigatório</span>
    </div>
    <div class="form-group">
      <label class="form-label">Nova senha *</label>
      <input type="password" class="form-control" id="pw-nova" oninput="checkSenhaStrength(this.value)"/>
      <span class="input-error hidden" id="err-nova">Mínimo 8 caracteres</span>
      <div style="margin-top:8px" id="pw-strength-wrap" class="hidden">
        <div class="progress mb-sm"><div class="progress-bar" id="pw-bar" style="width:0%"></div></div>
        <span id="pw-lbl" style="font-size:11px"></span>
      </div>
    </div>
    <div class="form-group">
      <label class="form-label">Confirmar nova senha *</label>
      <input type="password" class="form-control" id="pw-conf"/>
      <span class="input-error hidden" id="err-conf">Senhas não conferem</span>
    </div>
    <div class="alert alert-info mt-lg">
      <span>ℹ</span>
      <div><p class="semi mb-sm">Requisitos de senha:</p>
        <p style="font-size:12px">• Mínimo de 8 caracteres</p>
        <p style="font-size:12px">• Ao menos uma letra maiúscula</p>
        <p style="font-size:12px">• Ao menos um número</p></div>
    </div>
    <div class="flex je gap-md mt-xl">
      <button class="btn btn-secondary btn-sm" onclick="document.querySelectorAll('#content input').forEach(i=>i.value='')">Cancelar</button>
      <button class="btn btn-primary btn-sm" id="btn-save-pw" onclick="salvarSenha()">✓ Alterar senha</button>
    </div>
  </div>`;
}
function checkSenhaStrength(v) {
  const w = document.getElementById('pw-strength-wrap');
  const bar = document.getElementById('pw-bar');
  const lbl = document.getElementById('pw-lbl');
  if (!w) return;
  if (!v) { w.classList.add('hidden'); return; }
  w.classList.remove('hidden');
  const strength = v.length<6?1:v.length<8?2:v.length<12?3:4;
  const cls = ['','pb-danger','pb-warning','pb-success','pb-success'];
  const labels = ['','Fraca','Razoável','Boa','Forte'];
  const colors = ['','var(--danger)','var(--warning)','var(--success)','var(--success)'];
  bar.className = 'progress-bar '+cls[strength];
  bar.style.width = (strength*25)+'%';
  lbl.textContent = 'Força: '+labels[strength];
  lbl.style.color = colors[strength];
}
function salvarSenha() {
  const atual = document.getElementById('pw-atual')?.value;
  const nova = document.getElementById('pw-nova')?.value;
  const conf = document.getElementById('pw-conf')?.value;
  let ok = true;
  if (!atual) { document.getElementById('err-atual').classList.remove('hidden'); ok=false; } else document.getElementById('err-atual').classList.add('hidden');
  if (!nova||nova.length<8) { document.getElementById('err-nova').classList.remove('hidden'); ok=false; } else document.getElementById('err-nova').classList.add('hidden');
  if (nova!==conf) { document.getElementById('err-conf').classList.remove('hidden'); ok=false; } else document.getElementById('err-conf').classList.add('hidden');
  if (!ok) return;
  const btn = document.getElementById('btn-save-pw');
  btn.disabled=true; btn.textContent='Salvando...';
  setTimeout(()=>{ toast('Senha alterada com sucesso!','s'); navigate('alterar-senha'); },1200);
}
