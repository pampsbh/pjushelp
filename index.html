<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PJUS – Service Desk</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800&family=Verdana&display=swap" rel="stylesheet" />

  <!-- Recharts + React via CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/recharts/2.12.7/Recharts.min.js"></script>

  <style>
    /* ═══════════════════════════════════════════
       ESTRADA DESIGN SYSTEM — TOKENS
    ═══════════════════════════════════════════ */
    :root {
      /* Breakpoints */
      --breakpoint-sm: 425px;
      --breakpoint-md: 768px;
      --breakpoint-lg: 1280px;

      /* Colors */
      --color-primary: #0061D6;
      --color-secondary: #4D5858;
      --color-status-success: #0E8557;
      --color-status-warning: #FEC33C;
      --color-status-danger: #FF4D4F;
      --color-status-info: #0858C5;
      --color-gray-100: #DBDEDE;
      --color-gray-200: #A5ABAB;
      --color-gray-300: #717979;
      --color-gray-400: #4D5858;
      --color-inactive: #DBDEDE;
      --color-text-pjus: #0061D6;
      --color-text-primary: #0A0A0A;
      --color-text-secondary: #717979;
      --color-text-contrast: #A5ABAB;

      /* Shadows */
      --shadow-sm: 0px 4px 4px 0px #00000012;
      --shadow-md: 0px 22px 10px 0px #00000012;
      --shadow-lg: 0px 30px 60px 0px #00000012;

      /* Sizes */
      --size-1: 12px;
      --size-2: 14px;
      --size-3: 16px;
      --size-4: 20px;
      --size-5: 24px;
      --size-6: 28px;
      --size-7: 40px;

      /* Spacing */
      --spacing-none: 0px;
      --spacing-sm: 4px;
      --spacing-md: 8px;
      --spacing-lg: 16px;
      --spacing-xl: 24px;
      --spacing-xxl: 32px;

      /* Font Weights */
      --weight-regular: 400;
      --weight-semi-bold: 600;
      --weight-bold: 700;
      --weight-extra-bold: 800;

      /* Fonts */
      --font-title: 'Verdana', sans-serif;
      --font-text: 'Lato', sans-serif;
    }

    /* ═══════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: var(--font-text); background: #f4f5f7; color: var(--color-text-primary); font-size: var(--size-2); }
    button { cursor: pointer; font-family: var(--font-text); }
    input, select, textarea { font-family: var(--font-text); }
    a { text-decoration: none; color: inherit; }
    ul { list-style: none; }

    /* ═══════════════════════════════════════════
       LAYOUT
    ═══════════════════════════════════════════ */
    .app { display: flex; height: 100vh; overflow: hidden; }

    /* SIDEBAR */
    .sidebar {
      width: 220px;
      min-width: 220px;
      background: #3D4549;
      display: flex;
      flex-direction: column;
      transition: width 0.25s ease, min-width 0.25s ease;
      overflow: hidden;
      z-index: 100;
    }
    .sidebar.collapsed { width: 0; min-width: 0; }

    .sidebar-logo {
      padding: var(--spacing-lg) var(--spacing-lg);
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      border-bottom: 1px solid rgba(255,255,255,0.08);
      min-height: 64px;
    }
    .sidebar-logo svg { flex-shrink: 0; }
    .sidebar-logo-text {
      font-family: var(--font-title);
      font-weight: var(--weight-bold);
      color: #fff;
      font-size: var(--size-5);
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .sidebar-user {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: var(--spacing-xl) var(--spacing-lg) var(--spacing-lg);
      gap: var(--spacing-md);
      border-bottom: 1px solid rgba(255,255,255,0.08);
    }
    .sidebar-avatar {
      width: 52px; height: 52px;
      border-radius: 50%;
      background: #5a6369;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .sidebar-user-name {
      color: #e0e4e6;
      font-size: var(--size-2);
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
    }

    .sidebar-nav { flex: 1; overflow-y: auto; padding: var(--spacing-md) 0; }
    .sidebar-nav::-webkit-scrollbar { width: 4px; }
    .sidebar-nav::-webkit-scrollbar-track { background: transparent; }
    .sidebar-nav::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .nav-item {
      display: flex;
      align-items: center;
      gap: var(--spacing-md);
      padding: 10px var(--spacing-lg);
      color: #c8d0d4;
      font-size: var(--size-2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
      user-select: none;
    }
    .nav-item:hover { background: rgba(255,255,255,0.07); color: #fff; }
    .nav-item.active { background: rgba(0,97,214,0.25); color: #fff; }
    .nav-item.active .nav-icon { color: var(--color-primary); }
    .nav-icon { font-size: 17px; flex-shrink: 0; width: 20px; text-align: center; }
    .nav-label { flex: 1; }
    .nav-chevron { font-size: 12px; transition: transform 0.2s; }
    .nav-chevron.open { transform: rotate(180deg); }

    .nav-submenu { overflow: hidden; }
    .nav-group-label {
      padding: 6px var(--spacing-lg) 4px 48px;
      color: #8a9499;
      font-size: var(--size-1);
      font-weight: var(--weight-semi-bold);
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .nav-subitem {
      padding: 8px var(--spacing-lg) 8px 48px;
      color: #adb5ba;
      font-size: var(--size-2);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      white-space: nowrap;
    }
    .nav-subitem:hover { background: rgba(255,255,255,0.06); color: #fff; }
    .nav-subitem.active { color: #fff; font-weight: var(--weight-semi-bold); }

    /* MAIN */
    .main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }

    /* TOPBAR */
    .topbar {
      background: #fff;
      border-bottom: 1px solid var(--color-gray-100);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 var(--spacing-xl);
      height: 48px;
      gap: var(--spacing-lg);
      flex-shrink: 0;
      box-shadow: var(--shadow-sm);
    }
    .topbar-left { display: flex; align-items: center; gap: var(--spacing-lg); }
    .topbar-right { display: flex; align-items: center; gap: var(--spacing-lg); }

    .hamburger {
      background: none; border: none; padding: 6px;
      color: var(--color-text-secondary); font-size: 20px;
      display: flex; align-items: center;
      border-radius: 4px;
      transition: background 0.15s;
    }
    .hamburger:hover { background: var(--color-gray-100); }

    .topbar-greeting {
      font-size: var(--size-2);
      color: var(--color-text-secondary);
      white-space: nowrap;
    }
    .topbar-ip { color: var(--color-text-contrast); font-size: var(--size-1); }

    .topbar-icon-btn {
      background: none; border: none; padding: 6px;
      color: var(--color-text-secondary); font-size: 18px;
      border-radius: 4px; transition: background 0.15s;
      display: flex; align-items: center;
    }
    .topbar-icon-btn:hover { background: var(--color-gray-100); }

    .btn-sair {
      background: none; border: none;
      color: var(--color-status-danger);
      font-size: var(--size-2);
      font-weight: var(--weight-semi-bold);
      display: flex; align-items: center; gap: 4px;
      padding: 4px 8px; border-radius: 4px;
      transition: background 0.15s;
    }
    .btn-sair:hover { background: #fff0f0; }

    /* SUBTOOLBAR */
    .subtoolbar {
      background: #fff;
      border-bottom: 1px solid var(--color-gray-100);
      display: flex;
      align-items: center;
      padding: 6px var(--spacing-xl);
      gap: var(--spacing-lg);
      flex-shrink: 0;
      flex-wrap: wrap;
    }
    .subtoolbar-left { display: flex; align-items: center; gap: var(--spacing-md); flex: 1; flex-wrap: wrap; }
    .subtoolbar-right { display: flex; align-items: center; gap: var(--spacing-md); }

    .subtoolbar-label { font-size: var(--size-2); color: var(--color-text-secondary); white-space: nowrap; }
    .subtoolbar-input {
      border: 1px solid var(--color-gray-100); border-radius: 4px;
      padding: 4px 10px; font-size: var(--size-2);
      color: var(--color-text-primary); outline: none;
      transition: border-color 0.15s;
      width: 220px;
    }
    .subtoolbar-input:focus { border-color: var(--color-primary); }
    .subtoolbar-select {
      border: 1px solid var(--color-gray-100); border-radius: 4px;
      padding: 4px 10px; font-size: var(--size-2);
      color: var(--color-text-primary); outline: none;
      background: #fff; cursor: pointer;
      transition: border-color 0.15s;
    }
    .subtoolbar-select:focus { border-color: var(--color-primary); }

    .btn-link {
      background: none; border: none;
      color: var(--color-primary); font-size: var(--size-2);
      display: flex; align-items: center; gap: 4px;
      padding: 4px 8px; border-radius: 4px;
      transition: background 0.15s;
    }
    .btn-link:hover { background: #e8f0fe; }

    /* BTN (Estrada) */
    .btn {
      width: fit-content;
      padding: var(--spacing-md) var(--spacing-lg);
      border-radius: 4px;
      font-size: var(--size-3);
      font-weight: 700;
      border: 1px solid transparent;
      box-sizing: border-box;
      display: inline-flex; align-items: center; gap: 6px;
    }
    .btn:not(:disabled):hover { cursor: pointer; }
    .btn-primary {
      background-color: var(--color-primary);
      border-color: var(--color-primary);
      color: white;
    }
    .btn-primary:hover { background-color: #0051b5; border-color: #0051b5; }
    .btn-secondary {
      background-color: white !important;
      color: var(--color-secondary);
      border-color: var(--color-secondary);
    }
    .btn-secondary:hover { color: var(--color-primary); border-color: var(--color-primary); }
    .btn-sm { padding: var(--spacing-sm) var(--spacing-lg); font-size: var(--size-2); }
    .btn-danger { background-color: var(--color-status-danger); color: white; border-color: var(--color-status-danger); }
    .btn-danger:hover { background-color: #e03030; }
    .btn-success { background-color: var(--color-status-success); color: white; border-color: var(--color-status-success); }

    /* CONTENT */
    .content { flex: 1; overflow-y: auto; padding: var(--spacing-xl); }
    .content::-webkit-scrollbar { width: 6px; }
    .content::-webkit-scrollbar-track { background: transparent; }
    .content::-webkit-scrollbar-thumb { background: var(--color-gray-100); border-radius: 4px; }

    /* PAGE HEADER */
    .page-header {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: var(--spacing-xl);
      padding-bottom: var(--spacing-md);
      border-bottom: 2px solid var(--color-text-primary);
    }
    .page-title {
      font-family: var(--font-title);
      font-weight: var(--weight-bold);
      font-size: var(--size-4);
      color: var(--color-text-primary);
    }

    /* SECTION */
    .section { margin-bottom: var(--spacing-xxl); }
    .section-title {
      font-family: var(--font-title);
      font-weight: var(--weight-bold);
      font-size: var(--size-3);
      color: var(--color-text-primary);
      margin-bottom: var(--spacing-lg);
      padding-bottom: var(--spacing-sm);
      border-bottom: 1px solid var(--color-text-primary);
    }

    /* GRID */
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--spacing-lg); }
    .grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: var(--spacing-lg); }
    @media (max-width: 900px) {
      .grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 600px) {
      .grid-3, .grid-2 { grid-template-columns: 1fr; }
    }

    /* KPI CARD (Estrada) */
    .kpi-card {
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow-sm);
    }
    .kpi-card-header {
      background: #3D4549;
      color: #fff;
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: var(--size-2);
      font-weight: var(--weight-semi-bold);
      text-align: center;
    }
    .kpi-card-body {
      padding: var(--spacing-lg);
      display: flex; align-items: center; justify-content: center;
      min-height: 72px;
    }
    .kpi-value {
      font-size: 32px;
      font-weight: var(--weight-bold);
      font-family: var(--font-title);
    }
    .kpi-danger { color: var(--color-status-danger); }
    .kpi-warning { color: var(--color-status-warning); }
    .kpi-success { color: var(--color-status-success); }
    .kpi-info { color: var(--color-status-info); }

    /* CHART CARD */
    .chart-card {
      border-radius: 8px;
      overflow: hidden;
      background: #fff;
      box-shadow: var(--shadow-sm);
    }
    .chart-card-header {
      background: #3D4549;
      color: #fff;
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: var(--size-2);
      font-weight: var(--weight-semi-bold);
      text-align: center;
    }
    .chart-card-body { padding: var(--spacing-lg); }

    /* FORM (Estrada) */
    .form-group { margin-bottom: var(--spacing-lg); }
    .form-label {
      display: block;
      font-size: var(--size-1);
      color: var(--color-text-secondary);
      line-height: 18px;
      margin-bottom: var(--spacing-md);
    }
    .form-control {
      padding: var(--spacing-sm) var(--spacing-lg);
      border-radius: 4px;
      border: 1px solid var(--color-gray-100);
      font-size: var(--size-2);
      display: block; width: 100%;
      box-sizing: border-box; outline: none;
      box-shadow: none; font-weight: 400;
      line-height: 21px; font-family: var(--font-text);
      transition: border-color 0.15s;
    }
    .form-control:focus { border-color: var(--color-primary); }
    .form-control[readonly] { background: var(--color-gray-100); }
    .form-control.invalid { border-color: var(--color-status-danger); }
    .input-error { color: var(--color-status-danger); font-size: var(--size-1); margin-top: 4px; }
    textarea.form-control { resize: vertical; min-height: 100px; }
    select.form-control { cursor: pointer; }

    /* TABLE */
    .table-wrapper { overflow-x: auto; border-radius: 8px; box-shadow: var(--shadow-sm); }
    table { width: 100%; border-collapse: collapse; background: #fff; }
    thead tr { background: #3D4549; color: #fff; }
    thead th {
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: var(--size-2); font-weight: var(--weight-semi-bold);
      text-align: left; white-space: nowrap;
    }
    tbody tr { border-bottom: 1px solid var(--color-gray-100); transition: background 0.12s; }
    tbody tr:hover { background: #f8f9fa; }
    tbody tr:last-child { border-bottom: none; }
    td {
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: var(--size-2); color: var(--color-text-primary);
    }

    /* BADGE */
    .badge {
      display: inline-flex; align-items: center;
      padding: 2px 8px; border-radius: 12px;
      font-size: var(--size-1); font-weight: var(--weight-semi-bold);
    }
    .badge-danger { background: #fff0f0; color: var(--color-status-danger); }
    .badge-success { background: #e8f5ef; color: var(--color-status-success); }
    .badge-warning { background: #fff8e6; color: #b88b00; }
    .badge-info { background: #e8f0fe; color: var(--color-status-info); }
    .badge-secondary { background: var(--color-gray-100); color: var(--color-text-secondary); }

    /* TABS (Estrada) */
    .tabs { display: flex; gap: 4px; border-bottom: 2px solid var(--color-gray-100); margin-bottom: var(--spacing-xl); }
    .btn-tab {
      background: transparent; color: var(--color-text-secondary);
      padding: var(--spacing-md) var(--spacing-lg);
      font-size: var(--size-3) !important;
      border: none; cursor: pointer;
      border-radius: 4px 4px 0 0; margin-bottom: -2px;
      font-family: var(--font-text);
      transition: color 0.15s, background 0.15s;
      border-bottom: 2px solid transparent;
    }
    .btn-tab:hover { color: var(--color-primary); background: #f0f4ff; }
    .btn-tab.active {
      color: var(--color-primary); font-weight: var(--weight-bold);
      border-bottom: 2px solid var(--color-primary);
    }

    /* CARD (Estrada) */
    .card { padding: 16px; border: none; border-radius: 8px; background: #fff; }
    .card-bordered { border: 1px solid var(--color-gray-100); }
    .card.shadow-sm { box-shadow: var(--shadow-sm); }
    .card.shadow-md { box-shadow: var(--shadow-md); }

    /* ALERT */
    .alert {
      padding: var(--spacing-lg); border-radius: 8px;
      font-size: var(--size-2); margin-bottom: var(--spacing-lg);
      display: flex; align-items: flex-start; gap: var(--spacing-md);
    }
    .alert-info { background: #e8f0fe; color: var(--color-status-info); border-left: 4px solid var(--color-status-info); }
    .alert-success { background: #e8f5ef; color: var(--color-status-success); border-left: 4px solid var(--color-status-success); }
    .alert-danger { background: #fff0f0; color: var(--color-status-danger); border-left: 4px solid var(--color-status-danger); }
    .alert-warning { background: #fff8e6; color: #b88b00; border-left: 4px solid var(--color-status-warning); }

    /* MODAL OVERLAY */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 999; padding: var(--spacing-lg);
    }
    .modal {
      background: #fff; border-radius: 8px;
      width: 100%; max-width: 560px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: var(--shadow-lg);
    }
    .modal-header {
      display: flex; align-items: center; justify-content: space-between;
      padding: var(--spacing-lg) var(--spacing-xl);
      border-bottom: 1px solid var(--color-gray-100);
    }
    .modal-title {
      font-family: var(--font-title); font-weight: var(--weight-bold);
      font-size: var(--size-3);
    }
    .modal-body { padding: var(--spacing-xl); }
    .modal-footer {
      padding: var(--spacing-lg) var(--spacing-xl);
      border-top: 1px solid var(--color-gray-100);
      display: flex; justify-content: flex-end; gap: var(--spacing-md);
    }
    .btn-close {
      background: none; border: none; font-size: 20px;
      color: var(--color-text-secondary); padding: 4px;
      border-radius: 4px; line-height: 1;
    }
    .btn-close:hover { background: var(--color-gray-100); }

    /* STEPPER */
    .stepper { display: flex; align-items: center; margin-bottom: var(--spacing-xxl); gap: 0; }
    .step {
      display: flex; align-items: center; gap: var(--spacing-md); flex: 1;
    }
    .step:last-child { flex: 0; }
    .step-circle {
      width: 32px; height: 32px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-weight: var(--weight-bold); font-size: var(--size-2);
      flex-shrink: 0;
    }
    .step-circle.done { background: var(--color-status-success); color: #fff; }
    .step-circle.active { background: var(--color-primary); color: #fff; }
    .step-circle.pending { background: var(--color-gray-100); color: var(--color-text-secondary); }
    .step-label { font-size: var(--size-2); color: var(--color-text-secondary); white-space: nowrap; }
    .step-label.active { color: var(--color-primary); font-weight: var(--weight-semi-bold); }
    .step-line { flex: 1; height: 2px; background: var(--color-gray-100); margin: 0 8px; }
    .step-line.done { background: var(--color-status-success); }

    /* PAGINATION */
    .pagination { display: flex; align-items: center; gap: var(--spacing-sm); margin-top: var(--spacing-lg); justify-content: center; }
    .page-btn {
      width: 32px; height: 32px; border-radius: 4px;
      border: 1px solid var(--color-gray-100); background: #fff;
      font-size: var(--size-2); color: var(--color-text-secondary);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .page-btn:hover { border-color: var(--color-primary); color: var(--color-primary); }
    .page-btn.active { background: var(--color-primary); color: #fff; border-color: var(--color-primary); }

    /* RATING STARS */
    .stars { display: flex; gap: 4px; }
    .star { font-size: 24px; cursor: pointer; transition: color 0.1s; color: var(--color-gray-100); }
    .star.filled { color: var(--color-status-warning); }
    .star:hover { color: var(--color-status-warning); }

    /* SPINNER */
    .spinner {
      width: 20px; height: 20px;
      border: 3px solid var(--color-gray-100);
      border-top-color: var(--color-primary);
      border-radius: 50%; animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* EMPTY STATE */
    .empty-state {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; padding: 48px var(--spacing-xl);
      gap: var(--spacing-lg); color: var(--color-text-secondary);
    }

    .font-bold { font-weight: var(--weight-bold); }

    /* NOTIFICATION TOAST */
    .toast-container {
      position: fixed; bottom: 24px; right: 24px;
      display: flex; flex-direction: column; gap: 8px; z-index: 9999;
    }
    .toast {
      background: #fff; border-radius: 8px;
      box-shadow: var(--shadow-md); padding: 12px 16px;
      display: flex; align-items: center; gap: 10px;
      min-width: 280px; max-width: 380px;
      animation: slideIn 0.25s ease;
      border-left: 4px solid var(--color-primary);
    }
    .toast.success { border-color: var(--color-status-success); }
    .toast.error { border-color: var(--color-status-danger); }
    @keyframes slideIn { from { transform: translateX(120%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

    /* CALENDAR */
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 2px; }
    .cal-day {
      aspect-ratio: 1; border-radius: 4px;

    /* SEARCH HIGHLIGHT */
    mark { background: #fff3cd; padding: 0 2px; border-radius: 2px; }

    /* PROGRESS BAR */

    .progress-bar.primary { background: var(--color-primary); }
    .progress-bar.success { background: var(--color-status-success); }
    .progress-bar.warning { background: var(--color-status-warning); }
    .progress-bar.danger { background: var(--color-status-danger); }

    /* STATUS DOT */

    /* INPUT GROUP */

    /* ═══════════════════════
       PAGE: ABERTURA DE CHAMADO (stepper)
    ═══════════════════════ */
    function AberturaPage({ onToast }) {
      const [step, setStep] = useState(1);
      const [form, setForm] = useState({
        categoria: '', subcategoria: '', titulo: '', descricao: '',
        urgencia: 'Normal', anexo: null,
      });

      const steps = ['Categoria', 'Detalhes', 'Confirmação'];

      function next() {
        if (step < 3) setStep(s => s + 1);
        else { onToast('Chamado aberto com sucesso! #1007', 'success'); setStep(1); setForm({ categoria: '', subcategoria: '', titulo: '', descricao: '', urgencia: 'Normal', anexo: null }); }
      }
      function back() { if (step > 1) setStep(s => s - 1); }

      return (
        <div>
          <div className="page-header">
            <h1 className="page-title">Abertura de Chamado</h1>
          </div>

          {/* Stepper */}
          <div className="stepper mb-xl">
            {steps.map((s, i) => {
              const n = i + 1;
              const state = n < step ? 'done' : n === step ? 'active' : 'pending';
              return (
                <React.Fragment key={s}>
                  <div className="step">
                    <div className={`step-circle ${state}`}>{state === 'done' ? '✓' : n}</div>
                    <span className={`step-label${state === 'active' ? ' active' : ''}`}>{s}</span>
                  </div>
                  {i < steps.length - 1 && <div className={`step-line${step > n ? ' done' : ''}`} />}
                </React.Fragment>
              );
            })}
          </div>

          <div className="card shadow-sm" style={{ maxWidth: 640 }}>
            <div style={{ padding: 'var(--spacing-xl)' }}>
              {step === 1 && (
                <div>
                  <h3 className="mb-lg" style={{ fontFamily: 'var(--font-title)', fontSize: 'var(--size-3)', fontWeight: 700 }}>Selecione a categoria</h3>
                  <div className="form-group">
                    <label className="form-label">Categoria *</label>
                    <select className="form-control" value={form.categoria} onChange={e => setForm({ ...form, categoria: e.target.value })}>
                      <option value="">Selecione...</option>
                      <option>Financeiro</option>
                      <option>TI</option>
                      <option>Suporte</option>
                      <option>Cadastro</option>
                      <option>Operacional</option>
                    </select>
                  </div>
                  <div className="form-group">
                    <label className="form-label">Subcategoria</label>
                    <select className="form-control" value={form.subcategoria} onChange={e => setForm({ ...form, subcategoria: e.target.value })}>
                      <option value="">Selecione...</option>
                      <option>Boleto</option>
                      <option>Relatório</option>
                      <option>Acesso</option>
                      <option>Integração</option>
                    </select>
                  </div>
                </div>
              )}

              {step === 2 && (
                <div>
                  <h3 className="mb-lg" style={{ fontFamily: 'var(--font-title)', fontSize: 'var(--size-3)', fontWeight: 700 }}>Descreva o problema</h3>
                  <div className="form-group">
                    <label className="form-label">Título *</label>
                    <input className="form-control" placeholder="Resumo do problema" value={form.titulo} onChange={e => setForm({ ...form, titulo: e.target.value })} />
                  </div>
                  <div className="form-group">
                    <label className="form-label">Descrição *</label>
                    <textarea className="form-control" placeholder="Descreva o problema com detalhes..." rows={4} value={form.descricao} onChange={e => setForm({ ...form, descricao: e.target.value })} />
                  </div>
                  <div className="form-group">

    /* ═══════════════════════

    function AgendaPage({ onToast }) {
      const hoje = new Date();
      const [ano, setAno] = useState(hoje.getFullYear());
      const [mes, setMes] = useState(hoje.getMonth());
      const [eventos, setEventos] = useState([
        { data: '2024-03-18', titulo: 'Reunião de equipe' },
        { data: '2024-03-22', titulo: 'Review de chamados' },
        { data: '2024-03-25', titulo: 'Treinamento sistema' },
      ]);
      const [showModal, setShowModal] = useState(false);
      const [diaSelected, setDiaSelected] = useState(null);
      const [newEvento, setNewEvento] = useState('');

      const MESES = ['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
      const DIAS_SEMANA = ['Dom', 'Seg', 'Ter', 'Qua', 'Qui', 'Sex', 'Sáb'];

      function getDiasDoMes() {
        const primeiro = new Date(ano, mes, 1);
        const ultimo = new Date(ano, mes + 1, 0);
        const dias = [];
        // preenche dias do mês anterior
        for (let i = 0; i < primeiro.getDay(); i++) {
          const d = new Date(ano, mes, -primeiro.getDay() + i + 1);
          dias.push({ data: d, outro: true });
        }
        for (let d = 1; d <= ultimo.getDate(); d++) {
          dias.push({ data: new Date(ano, mes, d), outro: false });
        }
        // completa semana
        while (dias.length % 7 !== 0) {
          const last = dias[dias.length - 1].data;
          dias.push({ data: new Date(last.getFullYear(), last.getMonth(), last.getDate() + 1), outro: true });
        }
        return dias;
      }

      const dias = getDiasDoMes();
      const dataStr = (d) => `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;

      function addEvento() {
        if (!newEvento.trim()) return;
        setEventos(ev => [...ev, { data: dataStr(diaSelected), titulo: newEvento }]);
        onToast('Evento adicionado!', 'success');
        setShowModal(false);
        setNewEvento('');
      }

      const eventosDoMes = eventos.filter(e => e.data.startsWith(`${ano}-${String(mes+1).padStart(2,'0')}`));

      return (
        <div>
          <div className="page-header">
            <h1 className="page-title">Agenda</h1>
            <button className="btn btn-primary btn-sm" onClick={() => { setDiaSelected(hoje); setShowModal(true); }}>+ Novo evento</button>
          </div>

          <div className="grid-2" style={{ gridTemplateColumns: '2fr 1fr', gap: 24 }}>
            {/* Calendar */}
            <div className="card shadow-sm">
              <div style={{ padding: 'var(--spacing-lg)' }}>
                <div className="d-flex align-center justify-between mb-lg">
                  <button className="btn btn-secondary btn-sm" onClick={() => { if (mes === 0) { setMes(11); setAno(a => a-1); } else setMes(m => m-1); }}>‹</button>
                  <strong style={{ fontSize: 'var(--size-3)' }}>{MESES[mes]} {ano}</strong>
                  <button className="btn btn-secondary btn-sm" onClick={() => { if (mes === 11) { setMes(0); setAno(a => a+1); } else setMes(m => m+1); }}>›</button>
                </div>

                <div className="calendar-grid mb-sm">
                  {DIAS_SEMANA.map(d => <div key={d} className="cal-header">{d}</div>)}
                </div>
                <div className="calendar-grid">
                  {dias.map((d, i) => {
                    const isToday = dataStr(d.data) === dataStr(hoje);
                    const hasEv = eventos.some(e => e.data === dataStr(d.data));
                    return (
                      <div
                        key={i}
                        className={`cal-day${d.outro ? ' other-month' : ''}${isToday ? ' today' : ''}${hasEv ? ' has-event' : ''}`}
                        onClick={() => { if (!d.outro) { setDiaSelected(d.data); setShowModal(true); } }}
                      >
                        {d.data.getDate()}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* Eventos do mês */}
            <div>
              <div className="section-title">Eventos do mês</div>
              {eventosDoMes.length === 0 ? (
                <p className="text-muted text-sm">Nenhum evento este mês.</p>
              ) : (
                <div style={{ display: 'flex', flexDirection: 'column', gap: 8 }}>
                  {eventosDoMes.map((e, i) => (
                    <div key={i} className="card card-bordered" style={{ padding: '10px 14px' }}>
                      <p style={{ fontSize: 12, color: 'var(--color-text-secondary)' }}>{e.data}</p>
                      <p style={{ fontSize: 14, fontWeight: 600 }}>{e.titulo}</p>
                    </div>
                  ))}
                </div>
              )}
            </div>
          </div>

          {showModal && (
            <div className="modal-overlay" onClick={() => setShowModal(false)}>
              <div className="modal" onClick={e => e.stopPropagation()}>
                <div className="modal-header">
                  <span className="modal-title">Novo evento — {diaSelected ? dataStr(diaSelected) : ''}</span>
                  <button className="btn-close" onClick={() => setShowModal(false)}>✕</button>
                </div>
                <div className="modal-body">
                  <div className="form-group">
                    <label className="form-label">Título do evento *</label>
                    <input className="form-control" placeholder="Ex: Reunião, Treinamento..." value={newEvento} onChange={e => setNewEvento(e.target.value)} onKeyDown={e => e.key === 'Enter' && addEvento()} />
                  </div>
                </div>
                <div className="modal-footer">
                  <button className="btn btn-secondary btn-sm" onClick={() => setShowModal(false)}>Cancelar</button>
                  <button className="btn btn-primary btn-sm" onClick={addEvento}>Salvar</button>
                </div>
              </div>
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════
       PAGE: ALTERAR SENHA
    ═══════════════════════ */
    function AlterarSenhaPage({ onToast }) {
      const [form, setForm] = useState({ atual: '', nova: '', confirmar: '' });
      const [errors, setErrors] = useState({});
      const [loading, setLoading] = useState(false);

      function validate() {
        const e = {};
        if (!form.atual) e.atual = 'Campo obrigatório';
        if (!form.nova || form.nova.length < 8) e.nova = 'Mínimo 8 caracteres';
        if (form.nova !== form.confirmar) e.confirmar = 'Senhas não conferem';
        return e;
      }

      function submit(ev) {
        ev.preventDefault();
        const e = validate();
        if (Object.keys(e).length > 0) { setErrors(e); return; }
        setErrors({});
        setLoading(true);
        setTimeout(() => {
          setLoading(false);
          onToast('Senha alterada com sucesso!', 'success');
          setForm({ atual: '', nova: '', confirmar: '' });
        }, 1200);
      }

      const strength = form.nova.length === 0 ? 0 : form.nova.length < 6 ? 1 : form.nova.length < 10 ? 2 : form.nova.length < 14 ? 3 : 4;
      const strengthLabel = ['', 'Fraca', 'Razoável', 'Boa', 'Forte'];
      const strengthColor = ['', 'danger', 'warning', 'success', 'success'];

      return (
        <div>
          <div className="page-header">
            <h1 className="page-title">Alterar Senha</h1>
          </div>

          <div className="card shadow-sm" style={{ maxWidth: 480 }}>
            <div style={{ padding: 'var(--spacing-xl)' }}>
              <form onSubmit={submit}>
                <div className="form-group">
                  <label className="form-label">Senha atual *</label>
                  <input type="password" className={`form-control${errors.atual ? ' invalid' : ''}`}
                    value={form.atual} onChange={e => setForm({ ...form, atual: e.target.value })} />
                  {errors.atual && <span className="input-error">{errors.atual}</span>}
                </div>

                <div className="form-group">
                  <label className="form-label">Nova senha *</label>
                  <input type="password" className={`form-control${errors.nova ? ' invalid' : ''}`}
                    value={form.nova} onChange={e => setForm({ ...form, nova: e.target.value })} />
                  {errors.nova && <span className="input-error">{errors.nova}</span>}
                  {form.nova.length > 0 && (
                    <div style={{ marginTop: 8 }}>
                      <div className="progress mb-sm">
                        <div className={`progress-bar ${strengthColor[strength]}`} style={{ width: `${strength * 25}%` }} />
                      </div>
                      <span style={{ fontSize: 12, color: `var(--color-status-${strengthColor[strength]})` }}>
                        Força: {strengthLabel[strength]}
                      </span>
                    </div>
                  )}
                </div>

                <div className="form-group">
                  <label className="form-label">Confirmar nova senha *</label>
                  <input type="password" className={`form-control${errors.confirmar ? ' invalid' : ''}`}
                    value={form.confirmar} onChange={e => setForm({ ...form, confirmar: e.target.value })} />
                  {errors.confirmar && <span className="input-error">{errors.confirmar}</span>}
                </div>

                <div className="alert alert-info mt-lg">
                  <span>ℹ</span>
                  <div>
                    <p style={{ fontWeight: 600, marginBottom: 4 }}>Requisitos de senha:</p>
                    <p style={{ fontSize: 13 }}>• Mínimo de 8 caracteres</p>
                    <p style={{ fontSize: 13 }}>• Ao menos uma letra maiúscula</p>
                    <p style={{ fontSize: 13 }}>• Ao menos um número</p>
                  </div>
                </div>

                <div className="d-flex gap-md mt-xl" style={{ justifyContent: 'flex-end' }}>
                  <button type="button" className="btn btn-secondary btn-sm" onClick={() => setForm({ atual: '', nova: '', confirmar: '' })}>Cancelar</button>
                  <button type="submit" className="btn btn-primary btn-sm" disabled={loading}>
                    {loading ? <><span className="spinner" style={{ width: 14, height: 14, borderWidth: 2 }} /> Salvando...</> : '✓ Alterar senha'}
                  </button>
                </div>
              </form>
            </div>
          </div>
        </div>
      );
    }

              <div className="sidebar-avatar" style={{ margin: '0 auto var(--spacing-lg)', width: 72, height: 72 }}>
                <svg width="40" height="40" viewBox="0 0 40 40" fill="none">
                  <circle cx="20" cy="14" r="8" fill="#adb5ba"/>
                  <ellipse cx="20" cy="36" rx="14" ry="9" fill="#adb5ba"/>
                </svg>
              </div>
              <p style={{ fontWeight: 700, fontSize: 14, marginBottom: 4 }}>{form.nome.split(' ').slice(0, 2).join(' ')}</p>
              <p className="text-muted" style={{ fontSize: 12 }}>{form.cargo}</p>
              <p className="text-muted" style={{ fontSize: 12 }}>{form.departamento}</p>
              <div style={{ marginTop: 12 }}>
                <span className="badge badge-success">Ativo</span>
              </div>
            </div>

            {/* Form card */}
            <div className="card shadow-sm">
              <div style={{ padding: 'var(--spacing-xl)' }}>
                <div className="grid-2">
                  {fields.map(f => (
                    <div className="form-group" key={f.key}>
                      <label className="form-label">{f.label}</label>
                      <input
                        type={f.type || 'text'}
                        className="form-control"
                        value={form[f.key]}
                        readOnly={!editando}
                        onChange={e => setForm({ ...form, [f.key]: e.target.value })}
                      />
                    </div>
                  ))}
                </div>
                {editando && (
                  <div className="d-flex gap-md mt-lg" style={{ justifyContent: 'flex-end' }}>
                    <button className="btn btn-secondary btn-sm" onClick={cancelar}>Cancelar</button>
                    <button className="btn btn-primary btn-sm" onClick={salvar}>✓ Salvar alterações</button>
                  </div>
                )}
              </div>
            </div>
          </div>
        </div>
      );
    }

    /* ═══════════════════════
       PAGE: AJUDA
    ═══════════════════════ */
    function AjudaPage() {
      const [busca, setBusca] = useState('');
      const artigos = [
        { titulo: 'Como abrir um chamado', categoria: 'Chamados', conteudo: 'Para abrir um novo chamado, acesse o menu Chamados > Abertura.' },
        { titulo: 'Como acompanhar meus chamados', categoria: 'Chamados', conteudo: 'Acesse Chamados > Meus Chamados para visualizar todos os seus chamados.' },
        { titulo: 'Como alterar minha senha', categoria: 'Conta', conteudo: 'Acesse Configuração > Alterar Senha para modificar sua senha de acesso.' },
        { titulo: 'Entendendo os status do SLA', categoria: 'SLA', conteudo: 'O SLA define o prazo de atendimento. Dentro do prazo = verde. Acima de 50% = amarelo.' },
        { titulo: 'Como avaliar um atendimento', categoria: 'Qualidade', conteudo: 'Após a conclusão do chamado, acesse Chamados > Pesquisa Satisfação.' },
        { titulo: 'Gerenciando sua agenda', categoria: 'Agenda', conteudo: 'Acesse Configuração > Agenda para adicionar e gerenciar seus compromissos.' },
      ];

      const filtrados = artigos.filter(a =>
        a.titulo.toLowerCase().includes(busca.toLowerCase()) ||
        a.categoria.toLowerCase().includes(busca.toLowerCase())
      );

      return (
        <div>
          <div className="page-header">
            <h1 className="page-title">Central de Ajuda</h1>
          </div>

          <div style={{ maxWidth: 560, marginBottom: 'var(--spacing-xl)' }}>
            <div className="input-group">
              <input className="form-control" placeholder="Buscar artigos de ajuda..." value={busca} onChange={e => setBusca(e.target.value)} />
              <button className="btn btn-primary" style={{ borderRadius: '0 4px 4px 0' }}>🔍 Buscar</button>
            </div>
          </div>

          {filtrados.length === 0 ? (
            <div className="empty-state">
              <span className="empty-state-icon">🔍</span>
              <span className="empty-state-text">Nenhum artigo encontrado para "{busca}"</span>
            </div>
          ) : (
            <div style={{ display: 'grid', gridTemplateColumns: 'repeat(auto-fill, minmax(280px, 1fr))', gap: 16 }}>
              {filtrados.map((a, i) => (
                <div key={i} className="card card-bordered shadow-sm" style={{ cursor: 'pointer', transition: 'box-shadow 0.15s' }}
                  onMouseEnter={e => e.currentTarget.style.boxShadow = 'var(--shadow-md)'}
                  onMouseLeave={e => e.currentTarget.style.boxShadow = 'var(--shadow-sm)'}
                >
                  <div style={{ padding: 'var(--spacing-lg)' }}>
                    <span className="badge badge-info mb-md" style={{ display: 'inline-flex' }}>{a.categoria}</span>
                    <p style={{ fontWeight: 700, marginBottom: 8, fontSize: 'var(--size-2)' }}>{a.titulo}</p>
                    <p style={{ fontSize: 'var(--size-1)', color: 'var(--color-text-secondary)', lineHeight: 1.5 }}>{a.conteudo}</p>
                    <div style={{ marginTop: 12 }}>
                      <span className="text-pjus" style={{ fontSize: 12, fontWeight: 600 }}>Ler mais →</span>
                    </div>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      );
    }

    /* ═══════════════════════
       APP ROOT
    ═══════════════════════ */
    function App() {
      const [sidebarOpen, setSidebarOpen] = useState(true);
      const [activePage, setActivePage] = useState('dashboard');
      const [toasts, setToasts] = useState([]);

      function addToast(msg, type = 'info') {
        const id = Date.now();
        setToasts(t => [...t, { id, msg, type }]);
        setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 3500);
      }
      function dismissToast(id) { setToasts(t => t.filter(x => x.id !== id)); }

      function renderPage() {
        switch (activePage) {
          case 'dashboard': return <Dashboard />;
          case 'abertura': return <AberturaPage onToast={addToast} />;
          case 'meus-chamados': return <MeusChamadosPage onToast={addToast} />;
          case 'pesquisa': return <PesquisaPage onToast={addToast} />;
          case 'agenda': return <AgendaPage onToast={addToast} />;
          case 'alterar-senha': return <AlterarSenhaPage onToast={addToast} />;
          case 'usuario': return <UsuarioPage onToast={addToast} />;
          case 'ajuda': return <AjudaPage />;
          default: return <Dashboard />;
        }
      }

      return (
        <div className="app">
          <Sidebar
            collapsed={!sidebarOpen}
            activePage={activePage}
            onNavigate={setActivePage}
            onClose={() => setSidebarOpen(false)}
          />

          <div className="main">
            <Topbar
              onToggleSidebar={() => setSidebarOpen(o => !o)}
              activePage={activePage}
              onNavigate={setActivePage}
            />
            <Subtoolbar onNavigate={setActivePage} />
            <div className="content">
              {renderPage()}
            </div>
          </div>

          <ToastContainer toasts={toasts} onDismiss={dismissToast} />
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
