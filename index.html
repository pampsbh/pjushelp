<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Help-Desk</title>
<!-- Fonte carregada dinamicamente pelo tema -->
<link id="theme-font" rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800&display=swap"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
/* ── TOKENS (valores padrão — sobrescritos pelo tema) ─────────────────────── */
:root{
  --primary:#0061D6;--primary-d:#0050b3;
  --success:#0E8557;--warning:#FEC33C;--danger:#FF4D4F;
  --gray-50:#f8f9fa;--gray-100:#DBDEDE;--gray-200:#A5ABAB;
  --gray-300:#717979;--gray-400:#4D5858;
  --text:#0A0A0A;--text-muted:#717979;
  --shadow-sm:0 2px 8px #0000001a;--shadow-md:0 6px 24px #0000001a;
  --radius:8px;--sidebar-bg:#2d3748;--sidebar-w:230px;
  --font:'Lato',sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:#f0f2f5;color:var(--text);font-size:14px}
button{cursor:pointer;font-family:inherit;border:none;background:none}
input,select,textarea{font-family:inherit}
a{text-decoration:none;color:inherit}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-thumb{background:#ccc;border-radius:3px}

/* SHELL */
#app{display:flex;height:100vh;overflow:hidden}

/* SIDEBAR */
.sidebar{width:var(--sidebar-w);background:var(--sidebar-bg);color:#e2e8f0;display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto}
.sidebar-brand{padding:20px 16px 16px;border-bottom:1px solid rgba(255,255,255,.1)}
.logo-txt{font-size:18px;font-weight:800;color:#fff;letter-spacing:.5px}
.logo-sub{font-size:11px;color:#94a3b8;margin-top:2px}
.sidebar-user{padding:12px 16px;border-bottom:1px solid rgba(255,255,255,.08);font-size:12px}
.sidebar-user .u-name{font-weight:700;color:#f1f5f9}
.sidebar-user .u-role{color:#94a3b8;font-size:11px}
.sidebar-nav{flex:1;padding:8px 0}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;cursor:pointer;font-size:13px;color:#cbd5e1;transition:background .15s}
.nav-item:hover{background:rgba(255,255,255,.08);color:#f1f5f9}
.nav-item.active{background:var(--primary);color:#fff;font-weight:700}
.nav-item svg{flex-shrink:0}
.nav-section{padding:16px 16px 4px;font-size:10px;text-transform:uppercase;letter-spacing:.8px;color:#64748b;font-weight:700}
.sidebar-footer{padding:12px 16px;border-top:1px solid rgba(255,255,255,.08)}
.btn-logout{width:100%;padding:8px;background:rgba(255,255,255,.07);color:#cbd5e1;border-radius:var(--radius);font-size:13px;text-align:center;transition:background .15s}
.btn-logout:hover{background:rgba(255,255,255,.14);color:#fff}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{background:#fff;padding:0 24px;height:56px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--gray-100);box-shadow:var(--shadow-sm);flex-shrink:0}
.topbar-title{font-size:16px;font-weight:700}
.topbar-actions{display:flex;gap:8px;align-items:center}
.content{flex:1;overflow-y:auto;padding:24px}

/* LOGIN */
#login-screen{display:none;align-items:center;justify-content:center;min-height:100vh;background:linear-gradient(135deg,#1e3a5f 0%,var(--primary) 100%)}
#login-screen.active{display:flex}
.login-card{background:#fff;border-radius:12px;padding:40px 36px;width:360px;box-shadow:0 20px 60px #00000030}
.login-logo{font-size:24px;font-weight:800;color:var(--primary);margin-bottom:4px}
.login-sub{font-size:13px;color:var(--text-muted);margin-bottom:28px}

/* FORMS */
.form-group{margin-bottom:14px}
.form-label{display:block;font-size:12px;font-weight:700;margin-bottom:5px;color:var(--text)}
.form-control{width:100%;padding:9px 12px;border:1px solid var(--gray-100);border-radius:var(--radius);font-size:13px;outline:none;transition:border-color .15s;background:#fff}
.form-control:focus{border-color:var(--primary);box-shadow:0 0 0 3px color-mix(in srgb,var(--primary) 15%,transparent)}
textarea.form-control{resize:vertical;min-height:80px}
.form-error{color:var(--danger);font-size:12px;margin-top:4px}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:var(--radius);font-size:13px;font-weight:700;transition:background .15s,opacity .15s;white-space:nowrap}
.btn-primary{background:var(--primary);color:#fff}.btn-primary:hover{background:var(--primary-d)}
.btn-success{background:var(--success);color:#fff}.btn-success:hover{filter:brightness(.88)}
.btn-warning{background:var(--warning);color:#333}.btn-warning:hover{filter:brightness(.92)}
.btn-danger{background:var(--danger);color:#fff}.btn-danger:hover{filter:brightness(.88)}
.btn-outline{background:#fff;color:var(--primary);border:1.5px solid var(--primary)}.btn-outline:hover{background:color-mix(in srgb,var(--primary) 8%,white)}
.btn-sm{padding:6px 12px;font-size:12px}
.btn-full{width:100%;justify-content:center}
.btn:disabled{opacity:.5;pointer-events:none}

/* CARDS */
.card{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow-sm);overflow:hidden}
.card-header{padding:16px 20px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:14px;font-weight:700}
.card-body{padding:20px}

/* METRICS */
.metrics-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:20px}
.metric-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);border-left:4px solid var(--primary)}
.metric-card.warn{border-color:var(--warning)}.metric-card.danger{border-color:var(--danger)}.metric-card.success{border-color:var(--success)}
.metric-label{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-bottom:8px}
.metric-value{font-size:32px;font-weight:800;line-height:1}
.metric-sub{font-size:11px;color:var(--text-muted);margin-top:4px}
.charts-grid{display:grid;grid-template-columns:2fr 1fr;gap:16px;margin-bottom:20px}

/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700}
.badge-open{background:#dbeafe;color:#1d4ed8}.badge-in_progress{background:#fef3c7;color:#92400e}
.badge-resolved{background:#d1fae5;color:#065f46}.badge-closed{background:#f3f4f6;color:#374151}
.badge-priority{background:#fee2e2;color:#991b1b}.badge-breach{background:#fce7f3;color:#9d174d}
.badge-auto{background:#ede9fe;color:#5b21b6}.badge-manual{background:#fef9c3;color:#713f12}
.badge-gerente{background:#dbeafe;color:#1e40af}.badge-estagiario{background:#dcfce7;color:#166534}
.badge-sla-ok{background:#d1fae5;color:#065f46}.badge-sla-warn{background:#fef3c7;color:#92400e}
.badge-sla-breach{background:#fee2e2;color:#991b1b}

/* TABLE */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--gray-50);padding:10px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);white-space:nowrap;border-bottom:2px solid var(--gray-100)}
td{padding:10px 12px;border-bottom:1px solid var(--gray-100);vertical-align:middle}
tr:hover td{background:#fafbfc}
tr.row-alert td{background:#fff5f5}
.action-btn{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:700;background:#f1f5f9;color:var(--primary);cursor:pointer;border:none;transition:background .15s}
.action-btn:hover{background:#dbeafe}

/* DEPT CARDS */
.dept-cards{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:8px}
.dept-card{border:2px solid var(--gray-100);border-radius:var(--radius);padding:16px;cursor:pointer;transition:border-color .15s,background .15s;text-align:center}
.dept-card:hover{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 5%,white)}
.dept-card.selected{border-color:var(--primary);background:color-mix(in srgb,var(--primary) 10%,white)}
.dept-card .dept-icon{font-size:24px;margin-bottom:6px}
.dept-card .dept-name{font-size:13px;font-weight:700}

/* MODAL */
.modal-overlay{display:none;position:fixed;inset:0;background:#00000060;z-index:1000;align-items:center;justify-content:center;padding:20px}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:12px;width:100%;max-width:640px;max-height:90vh;display:flex;flex-direction:column;box-shadow:0 20px 60px #00000030}
.modal-lg{max-width:820px}
.modal-header{padding:20px 24px;border-bottom:1px solid var(--gray-100);display:flex;align-items:center;justify-content:space-between;flex-shrink:0}
.modal-title{font-size:16px;font-weight:700}
.modal-close{width:28px;height:28px;border-radius:50%;background:var(--gray-50);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:var(--text-muted);border:none;transition:background .15s}
.modal-close:hover{background:var(--gray-100)}
.modal-body{padding:24px;overflow-y:auto;flex:1}
.modal-footer{padding:16px 24px;border-top:1px solid var(--gray-100);display:flex;justify-content:flex-end;gap:8px;flex-shrink:0}

/* FILTERS */
.filter-bar{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:16px;align-items:flex-end}
.filter-bar select,.filter-bar input{padding:7px 10px;border:1px solid var(--gray-100);border-radius:var(--radius);font-size:13px;background:#fff}

/* UPLOAD */
.upload-zone{border:2px dashed var(--gray-100);border-radius:var(--radius);padding:20px;text-align:center;cursor:pointer;transition:border-color .15s}
.upload-zone:hover{border-color:var(--primary)}
.upload-zone input{display:none}
.upload-list{margin-top:8px;display:flex;flex-direction:column;gap:4px}
.upload-item{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--gray-50);border-radius:6px;font-size:12px}
.upload-item .rm{cursor:pointer;color:var(--danger);font-size:14px;margin-left:auto}

/* HISTORY */
.history-item{border-left:3px solid var(--gray-100);padding:8px 12px;margin-bottom:8px}
.history-item .h-meta{font-size:11px;color:var(--text-muted);margin-bottom:3px}
.history-item .h-body{font-size:13px}

/* DETAIL GRID */
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.detail-item .di-label{font-size:11px;font-weight:700;color:var(--text-muted);text-transform:uppercase;margin-bottom:3px}
.detail-item.full{grid-column:1/-1}

/* ATTENDANT CARDS */
.equipe-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:16px}
.att-card{background:#fff;border-radius:var(--radius);padding:20px;box-shadow:var(--shadow-sm);border-top:4px solid var(--primary)}
.att-card.unavailable{border-top-color:var(--gray-200);opacity:.8}
.att-card-header{display:flex;justify-content:space-between;margin-bottom:14px}
.att-card-name{font-size:15px;font-weight:800}
.att-stats{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.att-stat{background:var(--gray-50);border-radius:6px;padding:10px;text-align:center}
.att-stat-val{font-size:22px;font-weight:800}
.att-stat-lbl{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.5px;color:var(--text-muted);margin-top:2px}
.att-toggle{display:flex;align-items:center;gap:8px;font-size:12px;font-weight:700}
.toggle-pill{width:40px;height:22px;border-radius:11px;cursor:pointer;border:none;transition:background .2s;position:relative}
.toggle-pill::after{content:'';position:absolute;top:3px;left:3px;width:16px;height:16px;background:#fff;border-radius:50%;transition:left .2s}
.toggle-pill.on{background:var(--success)}.toggle-pill.on::after{left:21px}
.toggle-pill.off{background:var(--gray-200)}

/* THEME SETTINGS PAGE */
.theme-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;max-width:900px}
.theme-grid .full{grid-column:1/-1}
.color-row{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:16px}
.color-field label{font-size:12px;font-weight:700;display:block;margin-bottom:6px}
.color-field .color-inputs{display:flex;align-items:center;gap:8px}
.color-field input[type=color]{width:44px;height:44px;border-radius:8px;border:1px solid var(--gray-100);cursor:pointer;padding:3px;background:#fff}
.color-field input[type=text]{width:90px;font-family:monospace;font-size:12px}
.font-preview-box{margin-top:12px;padding:16px;background:var(--gray-50);border-radius:8px;border:1px solid var(--gray-100)}
.theme-preview-bar{display:flex;gap:8px;padding:14px 18px;border-radius:var(--radius);margin-bottom:20px;align-items:center;flex-wrap:wrap}
.preview-dot{width:32px;height:32px;border-radius:50%;flex-shrink:0}

/* PAGINATION */
.pagination{display:flex;gap:6px;margin-top:16px;justify-content:flex-end}
.page-btn{padding:5px 10px;border-radius:6px;font-size:12px;font-weight:700;border:1px solid var(--gray-100);background:#fff;cursor:pointer}
.page-btn.active{background:var(--primary);color:#fff;border-color:var(--primary)}
.page-btn:disabled{opacity:.4;pointer-events:none}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px}
.toast-item{padding:12px 18px;border-radius:8px;color:#fff;font-size:13px;font-weight:600;box-shadow:var(--shadow-md);animation:slideIn .2s ease}
.toast-ok{background:var(--success)}.toast-err{background:var(--danger)}
@keyframes slideIn{from{transform:translateY(20px);opacity:0}to{transform:none;opacity:1}}

.empty-state{text-align:center;padding:48px;color:var(--text-muted)}
.empty-state .ei{font-size:48px;margin-bottom:12px}

@media(max-width:768px){
  .sidebar{display:none}
  .metrics-grid{grid-template-columns:1fr 1fr}
  .charts-grid{grid-template-columns:1fr}
  .dept-cards{grid-template-columns:1fr}
  .detail-grid{grid-template-columns:1fr}
  .equipe-grid{grid-template-columns:1fr}
  .theme-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-card">
    <div id="login-logo" class="login-logo">Help-Desk</div>
    <div id="login-sub" class="login-sub">Acesso ao sistema</div>
    <div class="form-group">
      <label class="form-label">E-mail</label>
      <input id="l-email" class="form-control" type="email" placeholder="seu@email.com"/>
    </div>
    <div class="form-group">
      <label class="form-label">Senha</label>
      <input id="l-pass" class="form-control" type="password" placeholder="••••••••"/>
    </div>
    <div id="l-err" class="form-error" style="margin-bottom:10px"></div>
    <button id="l-btn" class="btn btn-primary btn-full" onclick="doLogin()">Entrar</button>
    <p style="font-size:11px;color:var(--text-muted);margin-top:16px;text-align:center">
      Admin: admin@pjus.com.br / admin123<br>
      Atendente: carlos@empresa.com / admin123<br>
      Usuário: usuario@pjus.com.br / user123
    </p>
  </div>
</div>

<!-- APP -->
<div id="app" style="display:none">
  <aside class="sidebar">
    <div class="sidebar-brand" id="sidebar-brand">
      <div class="logo-txt">Help-Desk</div>
      <div class="logo-sub">Service Desk</div>
    </div>
    <div class="sidebar-user">
      <div class="u-name" id="sb-name">—</div>
      <div class="u-role" id="sb-role">—</div>
    </div>
    <nav class="sidebar-nav" id="sidebar-nav"></nav>
    <div class="sidebar-footer">
      <button class="btn-logout" onclick="doLogout()">Sair</button>
    </div>
  </aside>
  <div class="main">
    <div class="topbar">
      <span class="topbar-title" id="page-title">—</span>
      <div class="topbar-actions" id="topbar-actions"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal modal-lg" id="modal-box">
    <div class="modal-header">
      <span class="modal-title" id="modal-title">—</span>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-body" id="modal-body"></div>
    <div class="modal-footer" id="modal-footer"></div>
  </div>
</div>

<div id="toast"></div>

<script>
// ── CONSTANTS ─────────────────────────────────────────────────────────────────
const API = '/pjushelp/api';

const FONT_MAP = {
  'Lato':       'https://fonts.googleapis.com/css2?family=Lato:wght@400;600;700;800&display=swap',
  'Inter':      'https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap',
  'Roboto':     'https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&display=swap',
  'Open Sans':  'https://fonts.googleapis.com/css2?family=Open+Sans:wght@400;600;700;800&display=swap',
  'Nunito':     'https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap',
  'Poppins':    'https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap',
  'Montserrat': 'https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&display=swap',
};

const DEFAULT_THEME = {
  company_name:'PJUS', company_subtitle:'Service Desk', logo_url:'',
  color_primary:'#0061D6', color_sidebar:'#2d3748',
  color_success:'#0E8557', color_warning:'#FEC33C', color_danger:'#FF4D4F',
  font_family:'Lato', font_url: FONT_MAP['Lato'],
};

const S = { user:null, view:'', depts:[], attendants:[], charts:{}, theme:{...DEFAULT_THEME} };

// ── THEME ENGINE ──────────────────────────────────────────────────────────────
async function loadTheme() {
  try {
    const t = await fetch(API + '/theme.php', { credentials:'same-origin' }).then(r => r.json());
    applyTheme(t);
  } catch { applyTheme(DEFAULT_THEME); }
}

function applyTheme(t) {
  const root = document.documentElement;

  if (t.color_primary) {
    root.style.setProperty('--primary',   t.color_primary);
    root.style.setProperty('--primary-d', darkenHex(t.color_primary, 15));
  }
  if (t.color_sidebar) root.style.setProperty('--sidebar-bg', t.color_sidebar);
  if (t.color_success) root.style.setProperty('--success', t.color_success);
  if (t.color_warning) root.style.setProperty('--warning', t.color_warning);
  if (t.color_danger)  root.style.setProperty('--danger',  t.color_danger);

  // Fonte
  const font = t.font_family || 'Lato';
  const fontUrl = t.font_url || FONT_MAP[font] || FONT_MAP['Lato'];
  document.getElementById('theme-font').href = fontUrl;
  root.style.setProperty('--font', `'${font}', sans-serif`);

  // Branding — login
  const name     = t.company_name     || 'Help-Desk';
  const subtitle = t.company_subtitle || 'Service Desk';
  const logoUrl  = t.logo_url || '';

  document.title = `${name} — ${subtitle}`;

  const loginLogo = document.getElementById('login-logo');
  if (loginLogo) {
    loginLogo.innerHTML = logoUrl
      ? `<img src="${logoUrl}" style="max-height:56px;max-width:200px;object-fit:contain" alt="${name}"/>`
      : name;
  }
  const loginSub = document.getElementById('login-sub');
  if (loginSub) loginSub.textContent = `${subtitle} — Acesso ao sistema`;

  // Branding — sidebar
  renderSidebarBrand(name, subtitle, logoUrl);

  S.theme = { ...S.theme, ...t };
}

function renderSidebarBrand(name, subtitle, logoUrl) {
  const el = document.getElementById('sidebar-brand');
  if (!el) return;
  if (logoUrl) {
    el.innerHTML = `<img src="${logoUrl}" style="max-height:40px;max-width:180px;object-fit:contain;display:block;margin-bottom:6px" alt="${name}" onerror="this.style.display='none'"/><div class="logo-sub">${subtitle}</div>`;
  } else {
    el.innerHTML = `<div class="logo-txt">${name}</div><div class="logo-sub">${subtitle}</div>`;
  }
}

function darkenHex(hex, pct) {
  const n = parseInt(hex.replace('#',''),16);
  const f = 1 - pct/100;
  const r = Math.max(0, Math.round(((n >> 16) & 0xff) * f));
  const g = Math.max(0, Math.round(((n >>  8) & 0xff) * f));
  const b = Math.max(0, Math.round(( n        & 0xff) * f));
  return '#' + [r,g,b].map(c => c.toString(16).padStart(2,'0')).join('');
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
async function api(path, opts={}) {
  const res = await fetch(API + path, { credentials:'same-origin', headers:{'Content-Type':'application/json',...opts.headers}, ...opts });
  const data = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(data.error || 'Erro desconhecido');
  return data;
}

function toast(msg, ok=true) {
  const el = document.createElement('div');
  el.className = 'toast-item ' + (ok?'toast-ok':'toast-err');
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

function fmt(dt) {
  if (!dt) return '—';
  return new Date(dt).toLocaleString('pt-BR',{dateStyle:'short',timeStyle:'short'});
}

function statusBadge(s) {
  const m={open:'Aberto',in_progress:'Em andamento',resolved:'Resolvido',closed:'Fechado'};
  return `<span class="badge badge-${s}">${m[s]||s}</span>`;
}

function slaBadge(t) {
  if (t.sla_breached==1) return '<span class="badge badge-breach">⚠ SLA Vencido</span>';
  if (!t.sla_deadline) return '—';
  return fmt(t.sla_deadline);
}

function slaColorBadge(t) {
  if (t.sla_breached==1) return `<span class="badge badge-sla-breach">⚠ Vencido</span>`;
  if (!t.sla_deadline)   return `<span class="badge badge-sla-ok">—</span>`;
  const h = (new Date(t.sla_deadline) - Date.now()) / 3600000;
  if (h < 2) return `<span class="badge badge-sla-warn">⚡ ${h.toFixed(1)}h</span>`;
  return `<span class="badge badge-sla-ok">${fmt(t.sla_deadline)}</span>`;
}

function assignmentBadge(t) {
  if (!t.assignment_type) return '—';
  return `<span class="badge badge-${t.assignment_type}">${t.assignment_type}</span>`;
}

function profileBadge(name) {
  if (!name) return '';
  const cls = /gerente/i.test(name)?'badge-gerente':'badge-estagiario';
  return `<span class="badge ${cls}">${name}</span>`;
}

function openModal(title, body, footer='') {
  document.getElementById('modal-title').textContent = title;
  document.getElementById('modal-body').innerHTML = body;
  document.getElementById('modal-footer').innerHTML = footer;
  document.getElementById('modal-overlay').classList.add('open');
}

function closeModal(e) {
  if (e && e.target!==document.getElementById('modal-overlay')) return;
  document.getElementById('modal-overlay').classList.remove('open');
}
document.addEventListener('keydown', e => { if(e.key==='Escape') document.getElementById('modal-overlay').classList.remove('open'); });

function renderPagination(res, fn) {
  if (res.pages<=1) return '';
  let h='<div class="pagination">';
  for (let i=1;i<=res.pages;i++) h+=`<button class="page-btn ${i===res.page?'active':''}" onclick="${fn}(${i})">${i}</button>`;
  return h+'</div>';
}

function navigate(view) {
  S.view=view; setActiveNav(view);

  const titles={'new-ticket':'Abrir Chamado','my-tickets':'Meus Chamados','my-queue':'Minha Fila','admin-dashboard':'Dashboard','admin-tickets':'Fila de Chamados','admin-equipe':'Equipe — Painel de Carga','admin-rules':'Regras de Prioridade','admin-services':'Serviços','admin-settings':'Aparência & White Label'};
  document.getElementById('page-title').textContent=titles[view]||view;
  document.getElementById('topbar-actions').innerHTML='';
  document.getElementById('content').innerHTML='<div style="padding:40px;text-align:center;color:var(--text-muted)">Carregando...</div>';

    case 'admin-settings':  renderSettings();     break;
  }
}

function deptIcon(n){return /facilit/i.test(n)?'🏢':/gente|gestão/i.test(n)?'👥':'💻';}

async function selectDept(id) {
  document.querySelectorAll('.dept-card').forEach(c=>c.classList.remove('selected'));
  document.querySelector(`.dept-card[data-id="${id}"]`).classList.add('selected');
  window._selectedDept=id;
  const svcs=await api(`/departments.php?id=${id}&services=1`);
  const sel=document.getElementById('nt-service');
  sel.innerHTML='<option value="">— selecione —</option>'+svcs.map(s=>`<option value="${s.id}">${s.name} (SLA ${s.sla_hours}h)</option>`).join('');
  document.getElementById('svc-group').style.display='block';
}

function addFiles(e) {
  const files=Array.from(e.target.files);
  if ((window._selectedFiles.length+files.length)>5){toast('Máximo 5 arquivos',false);return;}
  window._selectedFiles=window._selectedFiles.concat(files);
  document.getElementById('nt-file-list').innerHTML=window._selectedFiles.map((f,i)=>
    `<div class="upload-item">📎 ${f.name} <span style="color:var(--text-muted)">(${(f.size/1024).toFixed(0)} KB)</span><span class="rm" onclick="window._selectedFiles.splice(${i},1);document.getElementById('nt-file-list').innerHTML='';addFiles({target:{files:[]}})">✕</span></div>`
  ).join('');
  e.target.value='';
}

async function submitTicket() {
  const deptId=window._selectedDept, serviceId=document.getElementById('nt-service')?.value;
  const desc=document.getElementById('nt-desc').value.trim(), err=document.getElementById('nt-err');
  err.textContent='';
  if (!deptId){err.textContent='Selecione um departamento';return;}
  if (!serviceId){err.textContent='Selecione um serviço';return;}
  if (desc.length<20){err.textContent='Mínimo 20 caracteres';return;}
  if ((window._selectedFiles||[]).reduce((s,f)=>s+f.size,0)>5*1024*1024){err.textContent='Total de anexos excede 5 MB';return;}
  try {
    const ticket=await api('/tickets.php',{method:'POST',body:JSON.stringify({department_id:deptId,service_id:serviceId,description:desc})});
    for (const f of (window._selectedFiles||[])){const fd=new FormData();fd.append('file',f);await fetch(`${API}/upload.php?ticket_id=${ticket.id}`,{method:'POST',credentials:'same-origin',body:fd});}
    openModal('Chamado Aberto!',
      `<div style="text-align:center;padding:20px 0">
        <div style="font-size:48px;margin-bottom:12px">${ticket.is_priority==1?'🔥':'✅'}</div>
        <div style="font-size:28px;font-weight:800;color:var(--primary);margin-bottom:8px">#${ticket.id}</div>
        ${ticket.is_priority==1?`<div style="background:#fee2e2;color:#991b1b;padding:10px;border-radius:8px;margin-bottom:12px;font-weight:700">🔥 Prioritário — ${ticket.priority_reason}</div>`:''}
        ${ticket.attendant_name?`<div style="background:color-mix(in srgb,var(--primary) 8%,white);padding:10px;border-radius:8px;margin-bottom:12px;font-size:13px">👤 Atribuído a <b>${ticket.attendant_name}</b></div>`:''}
        <div style="background:var(--gray-50);padding:12px;border-radius:8px;font-size:13px"><b>Prazo SLA:</b> ${fmt(ticket.sla_deadline)}</div>
      </div>`,
      `<button class="btn btn-primary" onclick="navigate('my-tickets');closeModal()">Ver meus chamados</button>
       <button class="btn btn-outline" onclick="navigate('new-ticket');closeModal()">Abrir outro</button>`
    );
  } catch(e){err.textContent=e.message;}
}

async function startTicket(id){
  try{await api(`/tickets.php?id=${id}`,{method:'PATCH',body:JSON.stringify({status:'in_progress'})});toast('Atendimento iniciado!');renderMyQueue();}catch(e){toast(e.message,false);}
}

function resolveModal(id){
  openModal('Resolver Chamado #'+id,
    `<div class="form-group"><label class="form-label">Descrição da resolução <span style="color:var(--danger)">*</span></label><textarea id="resolve-obs" class="form-control" rows="4" placeholder="Descreva como o chamado foi resolvido..."></textarea></div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-success" onclick="doResolve(${id})">Confirmar Resolução</button>`
  );
}

async function doResolve(id){
  const obs=document.getElementById('resolve-obs').value.trim();
  if (!obs){toast('Informe a resolução',false);return;}
  try{await api(`/tickets.php?id=${id}`,{method:'PATCH',body:JSON.stringify({status:'resolved',observation:obs})});toast('Chamado resolvido!');closeModal();renderMyQueue();}catch(e){toast(e.message,false);}
}

    S.charts.monthly=new Chart(document.getElementById('chart-monthly'),{type:'bar',data:{labels:monthly.map(m=>m.label),datasets:[{label:'Abertos',data:monthly.map(m=>m.opened),backgroundColor:primary+'33',borderColor:primary,borderWidth:2},{label:'Resolvidos',data:monthly.map(m=>m.resolved),backgroundColor:success+'33',borderColor:success,borderWidth:2}]},options:{responsive:true,plugins:{legend:{position:'bottom'}},scales:{y:{beginAtZero:true,ticks:{precision:0}}}}});

// ── VIEW: ADMIN TICKETS ───────────────────────────────────────────────────────
let adminPage=1, adminFilters={};
async function renderAdminTickets(page=1) {
  adminPage=page;
  if (!S.depts.length) S.depts=await api('/departments.php');
  if (!S.attendants.length) try{S.attendants=await api('/admin/attendants.php');}catch{}
  const p=new URLSearchParams({page,limit:20});
  if (adminFilters.status)     p.set('status',adminFilters.status);
  if (adminFilters.dept)       p.set('department_id',adminFilters.dept);
  if (adminFilters.assignedTo) p.set('assigned_to',adminFilters.assignedTo);
  if (adminFilters.priority)   p.set('is_priority','1');
  if (adminFilters.breached)   p.set('sla_breached','1');
  if (adminFilters.unassigned) p.set('unassigned','1');
  try {
    const res=await api(`/admin/queue.php?${p}`), rows=res.data;
    const deptOpts=S.depts.map(d=>`<option value="${d.id}">${d.name}</option>`).join('');
    const attOpts=S.attendants.map(a=>`<option value="${a.id}">${a.name}</option>`).join('');
    document.getElementById('content').innerHTML=`
      <div class="card">
        <div class="card-header"><span class="card-title">Fila de Chamados</span><span style="font-size:12px;color:var(--text-muted)">${res.total} chamado(s)</span></div>
        <div class="card-body" style="padding-bottom:0"><div class="filter-bar">
          <select onchange="adminFilters.status=this.value;renderAdminTickets(1)"><option value="">Todos os status</option><option value="open">Aberto</option><option value="in_progress">Em andamento</option><option value="resolved">Resolvido</option><option value="closed">Fechado</option></select>
          <select onchange="adminFilters.dept=this.value;renderAdminTickets(1)"><option value="">Todos os departs.</option>${deptOpts}</select>
          <select onchange="adminFilters.assignedTo=this.value;renderAdminTickets(1)"><option value="">Todos os atendentes</option>${attOpts}</select>
          <label style="display:flex;align-items:center;gap:5px;font-size:13px"><input type="checkbox" ${adminFilters.priority?'checked':''} onchange="adminFilters.priority=this.checked;renderAdminTickets(1)"> Prioritários</label>
          <label style="display:flex;align-items:center;gap:5px;font-size:13px"><input type="checkbox" ${adminFilters.breached?'checked':''} onchange="adminFilters.breached=this.checked;renderAdminTickets(1)"> SLA vencido</label>
          <label style="display:flex;align-items:center;gap:5px;font-size:13px"><input type="checkbox" ${adminFilters.unassigned?'checked':''} onchange="adminFilters.unassigned=this.checked;renderAdminTickets(1)"> Sem responsável</label>
        </div></div>
        <div class="table-wrap"><table><thead><tr>
          <th>#</th><th>Usuário</th><th>Departamento</th><th>Serviço</th><th>Status</th><th>Responsável</th><th>Atribuição</th><th>SLA</th><th>Aberto em</th><th></th>
        </tr></thead><tbody>
        ${!rows.length?`<tr><td colspan="10" style="text-align:center;color:var(--text-muted);padding:32px">Nenhum chamado</td></tr>`:
        rows.map(t=>`<tr class="${t.sla_breached==1||t.is_priority==1?'row-alert':''}">
          <td><b>#${t.id}</b></td><td>${t.user_name}</td><td>${t.department_name}</td>
          <td>${t.service_name}${t.is_priority==1?' 🔥':''}</td>
          <td>${statusBadge(t.status)}</td>
          <td>${t.attendant_name?`<div style="line-height:1.4">${t.attendant_name}<br>${profileBadge(t.attendant_profile)}</div>`:'<span style="color:var(--danger);font-weight:700">⚠ Sem responsável</span>'}</td>
          <td>${assignmentBadge(t)}</td>
          <td style="${t.sla_breached==1?'color:var(--danger);font-weight:700':''}">${slaBadge(t)}</td>
          <td>${fmt(t.created_at)}</td>
          <td><button class="action-btn" onclick="viewTicket(${t.id},true)">Gerenciar</button></td>
        </tr>`).join('')}
        </tbody></table></div>
        <div style="padding:12px 16px">${renderPagination(res,'renderAdminTickets')}</div>
      </div>`;
  } catch(e){toast(e.message,false);}
}

async function toggleAvailability(userId,current){

}

// ── TICKET DETAIL ─────────────────────────────────────────────────────────────
async function viewTicket(id,isAdmin=false){
  openModal('Carregando...','<div style="padding:40px;text-align:center">Carregando...</div>','');
  try{
    const t=await api(`/tickets.php?id=${id}`);
    const hist=(t.history||[]).map(h=>`<div class="history-item"><div class="h-meta">${h.changed_by_name} — ${fmt(h.created_at)}</div><div class="h-body"><b>${fieldLabel(h.field_changed)}:</b> ${h.old_value||'—'} → ${h.new_value||'—'}</div></div>`).join('')||'<p style="color:var(--text-muted)">Sem histórico</p>';
    const atts=(t.attachments||[]).map(a=>`<a href="${a.file_path}" target="_blank" class="upload-item" style="text-decoration:none">📎 ${a.file_name} <span style="color:var(--text-muted)">(${(a.size_bytes/1024).toFixed(0)} KB)</span></a>`).join('')||'<p style="color:var(--text-muted)">Sem anexos</p>';
    document.getElementById('modal-title').textContent=`Chamado #${t.id}`;
    document.getElementById('modal-body').innerHTML=`
      <div class="detail-grid" style="margin-bottom:20px">
        <div class="detail-item"><div class="di-label">Status</div><div class="di-val">${statusBadge(t.status)}</div></div>
        <div class="detail-item"><div class="di-label">Prioridade</div><div class="di-val">${t.is_priority==1?'🔥 Prioritário':'Normal'}</div></div>
        <div class="detail-item"><div class="di-label">Departamento</div><div class="di-val">${t.department_name}</div></div>
        <div class="detail-item"><div class="di-label">Serviço</div><div class="di-val">${t.service_name}</div></div>
        <div class="detail-item"><div class="di-label">Usuário</div><div class="di-val">${t.user_name}</div></div>
        <div class="detail-item"><div class="di-label">Prazo SLA</div><div class="di-val" style="${t.sla_breached==1?'color:var(--danger);font-weight:700':''}">${slaBadge(t)}</div></div>
        <div class="detail-item"><div class="di-label">Responsável</div><div class="di-val">
          ${t.attendant_name?`${t.attendant_name} ${profileBadge(t.attendant_profile)} ${assignmentBadge(t)}`:'<span style="color:var(--danger)">⚠ Sem responsável</span>'}
          ${isAdmin?`<button class="action-btn" style="margin-left:8px" onclick="openReassignModal(${t.id},'${t.attendant_name||''}')">Reatribuir</button>`:''}
        </div></div>
        <div class="detail-item"><div class="di-label">Aberto em</div><div class="di-val">${fmt(t.created_at)}</div></div>
        ${t.priority_reason?`<div class="detail-item full"><div class="di-label">Motivo da Prioridade</div><div class="di-val">${t.priority_reason}</div></div>`:''}
        <div class="detail-item full"><div class="di-label">Descrição</div><div class="di-val" style="white-space:pre-wrap">${t.description}</div></div>
      </div>
      <div style="margin-bottom:16px"><div style="font-size:13px;font-weight:700;margin-bottom:8px">Anexos</div><div class="upload-list">${atts}</div></div>
      ${isAdmin?`<div style="margin-bottom:16px">
        <div style="font-size:13px;font-weight:700;margin-bottom:8px">Alterar Status</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <select id="m-status" class="form-control" style="width:auto">
            ${['open','in_progress','resolved','closed'].map(s=>`<option value="${s}" ${t.status===s?'selected':''}>${{open:'Aberto',in_progress:'Em andamento',resolved:'Resolvido',closed:'Fechado'}[s]}</option>`).join('')}
          </select>
          <label style="display:flex;align-items:center;gap:6px;font-size:13px"><input type="checkbox" id="m-priority" ${t.is_priority==1?'checked':''}> Marcar como prioritário</label>
        </div>
        <div class="form-group" style="margin-top:10px"><label class="form-label">Observação</label><textarea id="m-obs" class="form-control" rows="3" placeholder="Adicione uma observação..."></textarea></div>
      </div>`:''}
      <div><div style="font-size:13px;font-weight:700;margin-bottom:8px">Histórico</div>${hist}</div>`;
    document.getElementById('modal-footer').innerHTML=isAdmin
      ?`<button class="btn btn-outline" onclick="closeModal()">Fechar</button><button class="btn btn-primary" onclick="saveTicket(${t.id})">Salvar Alterações</button>`
      :`<button class="btn btn-primary" onclick="closeModal()">Fechar</button>`;
  }catch(e){toast(e.message,false);closeModal();}
}

async function saveTicket(id){
  try{await api(`/tickets.php?id=${id}`,{method:'PATCH',body:JSON.stringify({status:document.getElementById('m-status').value,is_priority:document.getElementById('m-priority').checked,observation:document.getElementById('m-obs').value.trim()})});toast('Chamado atualizado!');closeModal();renderAdminTickets(adminPage);}catch(e){toast(e.message,false);}
}

function fieldLabel(f){return{status:'Status',is_priority:'Prioridade',observation:'Observação',assigned_to:'Responsável'}[f]||f;}

async function openReassignModal(ticketId,currentName){
  if (!S.attendants.length) try{S.attendants=await api('/admin/attendants.php');}catch{}
  const opts=S.attendants.map(a=>`<option value="${a.id}">${a.name} — ${a.profile_name} (${parseInt(a.open_count)+parseInt(a.in_progress_count)} abertos)</option>`).join('');
  openModal(`Reatribuir #${ticketId}`,
    `${currentName?`<p style="margin-bottom:16px;font-size:13px">Atual: <b>${currentName}</b></p>`:''}
     <div class="form-group"><label class="form-label">Novo Responsável</label><select id="ra-user" class="form-control"><option value="">— selecione —</option>${opts}</select></div>
     <div class="form-group"><label class="form-label">Motivo <span style="color:var(--danger)">*</span></label><textarea id="ra-reason" class="form-control" rows="3" placeholder="Informe o motivo..."></textarea></div>`,
    `<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="doReassign(${ticketId})">Confirmar</button>`
  );
}

async function doReassign(ticketId){
  const assignedTo=document.getElementById('ra-user').value, reason=document.getElementById('ra-reason').value.trim();
  if (!assignedTo){toast('Selecione um atendente',false);return;}
  if (!reason){toast('Informe o motivo',false);return;}
  try{await api(`/tickets.php?id=${ticketId}&action=reassign`,{method:'PATCH',body:JSON.stringify({assignedTo:parseInt(assignedTo),reason})});toast('Chamado reatribuído!');closeModal();renderAdminTickets(adminPage);}catch(e){toast(e.message,false);}
}

async function renderRules(){

    document.getElementById('content').innerHTML=`
      <div class="card">
        <div class="card-header"><span class="card-title">Regras de Prioridade</span><button class="btn btn-primary btn-sm" onclick="openRuleModal()">+ Nova Regra</button></div>
        <div class="table-wrap"><table><thead><tr><th>#</th><th>Nome</th><th>Tipo</th><th>Valor</th><th>Status</th><th></th></tr></thead><tbody>

        rules.map(r=>`<tr><td>${r.id}</td><td><b>${r.name}</b><br><span style="font-size:11px;color:var(--text-muted)">${r.description||''}</span></td><td><span class="badge badge-open">${r.condition_type}</span></td><td>${r.condition_value||'—'}</td><td><span class="badge ${r.is_active?'badge-resolved':'badge-closed'}" style="cursor:pointer" onclick="toggleRule(${r.id},${r.is_active})">${r.is_active?'Ativa':'Inativa'}</span></td><td><button class="action-btn" onclick="openRuleModal(${JSON.stringify(r).replace(/"/g,'&quot;')})">Editar</button> <button class="action-btn" style="color:var(--danger)" onclick="deleteRule(${r.id})">Excluir</button></td></tr>`).join('')}

function openRuleModal(rule=null){const r=rule||{};openModal(rule?'Editar Regra':'Nova Regra',`<div class="form-group"><label class="form-label">Nome</label><input id="r-name" class="form-control" value="${r.name||''}"/></div><div class="form-group"><label class="form-label">Descrição</label><input id="r-desc" class="form-control" value="${r.description||''}"/></div><div class="form-group"><label class="form-label">Tipo</label><select id="r-type" class="form-control">${['keyword','department','service','manual'].map(t=>`<option value="${t}" ${r.condition_type===t?'selected':''}>${t}</option>`).join('')}</select></div><div class="form-group"><label class="form-label">Valor</label><input id="r-val" class="form-control" value="${r.condition_value||''}"/></div>`,`<button class="btn btn-outline" onclick="closeModal()">Cancelar</button><button class="btn btn-primary" onclick="saveRule(${r.id||0})">Salvar</button>`);}
async function saveRule(id){const b={name:document.getElementById('r-name').value.trim(),description:document.getElementById('r-desc').value.trim(),condition_type:document.getElementById('r-type').value,condition_value:document.getElementById('r-val').value.trim()};try{if(id)await api(`/admin/priority-rules.php?id=${id}`,{method:'PATCH',body:JSON.stringify(b)});else await api('/admin/priority-rules.php',{method:'POST',body:JSON.stringify(b)});toast('Regra salva!');closeModal();renderRules();}catch(e){toast(e.message,false);}}
async function toggleRule(id,c){try{await api(`/admin/priority-rules.php?id=${id}`,{method:'PATCH',body:JSON.stringify({is_active:c?0:1})});toast('Atualizado!');renderRules();}catch(e){toast(e.message,false);}}
async function deleteRule(id){if(!confirm('Excluir?'))return;try{await api(`/admin/priority-rules.php?id=${id}`,{method:'DELETE'});toast('Excluído!');renderRules();}catch(e){toast(e.message,false);}}

        <div class="card-body">
          <div class="color-row">
            ${colorFields.map(([id,label,val])=>`
              <div class="color-field">
                <label>${label}</label>
                <div class="color-inputs">
                  <input type="color" id="${id}" value="${val}"
                    oninput="document.getElementById('${id}-hex').value=this.value;previewColors()"/>
                  <input type="text" id="${id}-hex" class="form-control" value="${val}"
                    oninput="syncColor('${id}')"/>
                </div>
              </div>`).join('')}
          </div>
        </div>
      </div>

    </div>

    <div style="display:flex;gap:8px;margin-top:20px;max-width:900px">
      <button class="btn btn-primary" onclick="saveSettings()">💾 Salvar Configurações</button>
      <button class="btn btn-outline" onclick="resetTheme()">↩ Restaurar Padrões</button>
    </div>`;

  updateLogoPreview();
}

function previewBranding() {
  const name     = document.getElementById('th-company')?.value  || 'Help-Desk';
  const subtitle = document.getElementById('th-subtitle')?.value || 'Service Desk';
  const logoUrl  = document.getElementById('th-logo')?.value     || '';
  renderSidebarBrand(name, subtitle, logoUrl);
  document.title = `${name} — ${subtitle}`;
  const loginLogo = document.getElementById('login-logo');
  if (loginLogo) loginLogo.innerHTML = logoUrl ? `<img src="${logoUrl}" style="max-height:56px;max-width:200px;object-fit:contain" alt="${name}"/>` : name;
  const loginSub = document.getElementById('login-sub');
  if (loginSub) loginSub.textContent = `${subtitle} — Acesso ao sistema`;
  updateLogoPreview();
}

function previewFont() {
  const font = document.getElementById('th-font')?.value || 'Lato';
  const url  = FONT_MAP[font];
  if (url) document.getElementById('theme-font').href = url;
  document.documentElement.style.setProperty('--font', `'${font}', sans-serif`);
  const box = document.getElementById('font-preview-box');
  if (box) box.style.fontFamily = `'${font}', sans-serif`;
}

function previewColors() {
  const fields = {
    'th-primary':'--primary','th-sidebar':'--sidebar-bg',
    'th-success':'--success','th-warning':'--warning','th-danger':'--danger',
  };
  const root = document.documentElement;
  for (const [id, varName] of Object.entries(fields)) {
    const val = document.getElementById(id)?.value;
    if (val) {
      root.style.setProperty(varName, val);
      if (varName === '--primary') root.style.setProperty('--primary-d', darkenHex(val, 15));
      const dot = document.getElementById(id + '-dot');
      if (dot) dot.style.background = val;
    }
  }
}

function syncColor(id) {
  const hex = document.getElementById(id + '-hex')?.value.trim();
  if (/^#[0-9a-fA-F]{6}$/.test(hex)) {
    document.getElementById(id).value = hex;
    previewColors();
  }
}

function updateLogoPreview() {
  const url = document.getElementById('th-logo')?.value;
  const el  = document.getElementById('th-logo-preview');
  if (!el) return;
  el.innerHTML = url
    ? `<img src="${url}" style="max-height:50px;max-width:200px;object-fit:contain;border:1px solid var(--gray-100);border-radius:6px;padding:4px;background:#fff" onerror="this.parentNode.innerHTML='<span style=color:var(--danger);font-size:12px>URL inválida ou imagem não carregada</span>'"/>`
    : '';
}

function collectThemeValues() {
  return {
    company_name:     document.getElementById('th-company')?.value  || DEFAULT_THEME.company_name,
    company_subtitle: document.getElementById('th-subtitle')?.value || DEFAULT_THEME.company_subtitle,
    logo_url:         document.getElementById('th-logo')?.value     || '',
    color_primary:    document.getElementById('th-primary')?.value  || DEFAULT_THEME.color_primary,
    color_sidebar:    document.getElementById('th-sidebar')?.value  || DEFAULT_THEME.color_sidebar,
    color_success:    document.getElementById('th-success')?.value  || DEFAULT_THEME.color_success,
    color_warning:    document.getElementById('th-warning')?.value  || DEFAULT_THEME.color_warning,
    color_danger:     document.getElementById('th-danger')?.value   || DEFAULT_THEME.color_danger,
    font_family:      document.getElementById('th-font')?.value     || DEFAULT_THEME.font_family,
  };
}

async function saveSettings() {
  const t = collectThemeValues();
  t.font_url = FONT_MAP[t.font_family] || FONT_MAP['Lato'];
  try {
    await api('/theme.php', { method:'POST', body: JSON.stringify(t) });
    S.theme = { ...S.theme, ...t };
    toast('✅ Configurações salvas!');
  } catch(e) { toast(e.message, false); }
}

async function resetTheme() {
  if (!confirm('Restaurar todas as configurações padrão?')) return;
  const t = { ...DEFAULT_THEME };
  try {
    await api('/theme.php', { method:'POST', body: JSON.stringify(t) });
    applyTheme(t);
    toast('Tema restaurado!');
    renderSettings();
  } catch(e) { toast(e.message, false); }
}

// ── START ─────────────────────────────────────────────────────────────────────
init();
</script>
</body>
</html>
